<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>

<style>
    body {
        font-size: 12px;
    }
    .container {
        padding: 10px;
    }
    .field {
        margin-bottom: 5px;
    }
    .label {
        font-size: 10px;
    }
    .input {
        font-size: 10px;
    }
    .table {
        font-size: 10px;
    }
</style>

<div layout:fragment="content" class="container">

    <section class="section">
        <div class="container">
            <h1 class="title" th:text="#{collection.title}"></h1>
            <div class="box">
                <div class="field">
                    <label class="label"><strong th:text="#{collection.store.id} + ':'"></strong></label>
                    <div class="control">
                        <span th:text="${store.storeId} + ' (' + ${store.name} + ')'"></span>
                    </div>
                </div>
                <div class="field">
                    <label class="label"><strong th:text="#{collection.order.id} + ':'"></strong></label>
                    <div class="control">
                        <a th:href="@{/dashboard/orders/{orderId}(orderId=${orderId})}" th:text="${orderId}"></a>
                    </div>
                </div>
                <div class="field">
                    <label class="label"><strong th:text="#{collection.date} + ':'"></strong></label>
                    <div class="control">
                        <span th:text="${collectedAt}"></span>
                    </div>
                </div>
                <div class="field">
                    <label class="label"><strong th:text="#{collection.location} + ':'"></strong></label>
                    <div class="control">
                        <span th:text="${location}"></span>
                    </div>
                </div>
                <div class="field">
                    <label class="label" th:text="#{collection.items}"></label>
                    <div class="control">
                        <table class="table is-fullwidth">
                            <thead>
                            <tr>
                                <th th:text="#{collection.category}"></th>
                                <th th:text="#{collection.name}"></th>
                                <th th:text="#{collection.quantity}"></th>
                                <th th:text="#{collection.manufacturer.code}"></th>
                                <th th:text="#{collection.serial.no}"></th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${orderItems}" th:if="${item.category != T(pl.commercelink.taxonomy.ProductCategory).Services}">
                                <td th:text="${pcl.name(item.category)}"></td>
                                <td th:text="${item.name}"></td>
                                <td th:text="${item.qty}"></td>
                                <td th:text="${item.manufacturerCode}"></td>
                                <td th:text="${item.serialNo}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="field">
                    <label class="label" th:text="#{collection.confirm}"></label>
                </div>
                <div class="columns">
                    <div class="column">
                        <div class="field">
                            <label class="label" th:text="#{collection.store.signature}"></label>
                            <div class="control">
                                <input class="input" type="text" th:placeholder="#{collection.store.signature}">
                            </div>
                        </div>
                    </div>
                    <div class="column">
                        <div class="field">
                            <label class="label" th:text="#{collection.client.signature}"></label>
                            <div class="control">
                                <input class="input" type="text" th:placeholder="#{collection.client.signature}">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</div>

</body>
</html>
