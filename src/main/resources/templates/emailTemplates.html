<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>

<div layout:fragment="content">
    <section class="section">
        <div class="container" th:with="basePath=${isSuperAdmin} ? '/dashboard/store/' + ${store.storeId} + '/email-templates' : '/dashboard/store/email-templates'">
            <h1 th:text="#{nav.emailTemplates}"></h1>

            <div class="box">
                <form id="emailTemplateForm" method="post" th:action="@{${basePath + '/save'}}" th:object="${form}">
                    <input type="hidden" name="selectedType" id="selectedTypeInput" value="">

                    <div class="field">
                        <label class="label" th:text="#{store.template.type}"></label>
                        <div class="control">
                            <div class="select is-fullwidth">
                                <select id="templateSelect" onchange="showSelectedTemplate(this.value)">
                                    <option th:each="type, iterStat : ${notificationTypes}"
                                            th:value="${type.name()}"
                                            th:text="${type.name()}">
                                    </option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div th:each="type, iterStat : ${notificationTypes}"
                         th:attr="data-type=${type.name()}"
                         class="template-form"
                         style="display: none;">

                        <div th:if="${#maps.containsKey(store.clientNotificationsConfiguration.supportedTemplates, type.name())}">
                            <input type="hidden" th:field="*{emailTemplates[__${iterStat.index}__].storeId}" />
                            <input type="hidden" th:field="*{emailTemplates[__${iterStat.index}__].type}" />

                            <div class="field">
                                <label class="label" th:text="#{store.template.name}"></label>
                                <div class="control">
                                    <input class="input" type="text"
                                           th:field="*{emailTemplates[__${iterStat.index}__].templateName}"
                                           readonly />
                                </div>
                            </div>

                            <div class="field">
                                <label class="label" th:text="#{store.template.subject}"></label>
                                <div class="control">
                                    <input class="input" type="text"
                                           th:field="*{emailTemplates[__${iterStat.index}__].subject}"
                                           th:placeholder="#{store.template.subject}" />
                                </div>
                            </div>

                            <div class="field">
                                <label class="label" th:text="#{store.template.text.body}"></label>
                                <div class="control">
                            <textarea class="textarea"
                                      th:field="*{emailTemplates[__${iterStat.index}__].textBody}"
                                      th:placeholder="#{store.template.text.body}"
                                      rows="8"></textarea>
                                </div>
                            </div>

                            <div>
                                <label class="label" th:text="#{store.bcc.address}"></label>
                                <div class="control">
                                    <div th:each="bccAddress, bccIter : ${form.emailTemplates[__${iterStat.index}__].bccAddresses}">
                                        <input class="input"
                                               type="text"
                                               style="margin-bottom: 12px;"
                                               th:field="*{emailTemplates[__${iterStat.index}__].bccAddresses[__${bccIter.index}__]}"
                                               th:placeholder="#{store.bcc.address}" />
                                    </div>
                                </div>
                            </div>

                            <div class="field">
                                <label class="label" th:text="#{store.attachments}"></label>
                                <table class="table is-fullwidth is-striped">
                                    <thead>
                                    <tr>
                                        <th th:text="#{store.attachment.name}"></th>
                                        <th th:text="#{store.attachment.url}"></th>
                                    </tr>
                                    </thead>
                                    <tbody th:each="attachment, attachIter : ${form.emailTemplates[__${iterStat.index}__].attachments}">
                                    <tr>
                                        <td>
                                            <input class="input"
                                                   type="text"
                                                   th:field="*{emailTemplates[__${iterStat.index}__].attachments[__${attachIter.index}__].name}"
                                                   placeholder="Attachment Name" />
                                        </td>
                                        <td>
                                            <input class="input"
                                                   type="text"
                                                   th:field="*{emailTemplates[__${iterStat.index}__].attachments[__${attachIter.index}__].url}"
                                                   th:placeholder="#{store.attachment.url}" />
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>

                            <div class="field">
                                <label class="label" th:text="#{store.template.available.param}"></label>
                                <div class="content">
                                    <ul>
                                        <li th:each="templateParam : ${type.parameters}" th:text="${templateParam}"></li>
                                    </ul>
                                </div>
                            </div>

                            <div class="field">
                                <button class="button is-small is-danger"
                                        type="button"
                                        th:attr="data-type=${type.name()}, data-base-path=${basePath}"
                                        onclick="toggleNotification(this.getAttribute('data-base-path'), this.getAttribute('data-type'), 'disable')"
                                        th:text="#{store.disable.notification}">
                                </button>
                            </div>

                        </div>

                        <div th:if="${!#maps.containsKey(store.clientNotificationsConfiguration.supportedTemplates, type.name())}">
                            <button class="button is-small is-link"
                                    type="button"
                                    th:attr="data-type=${type.name()}, data-base-path=${basePath}"
                                    onclick="toggleNotification(this.getAttribute('data-base-path'), this.getAttribute('data-type'), 'enable')"
                                    th:text="#{store.enable.notification}">
                            </button>
                        </div>
                    </div>

                    <div class="field" style="margin-top: 24px;">
                        <button type="submit" class="button is-success" th:text="#{general.save}"></button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <script th:inline="javascript">
        function showSelectedTemplate(selectedType) {
            const allForms = document.querySelectorAll(".template-form");
            allForms.forEach(form => {
                form.style.display = form.getAttribute("data-type") === selectedType ? "block" : "none";
            });
        }

        function toggleNotification(basePath, notificationType, action) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = action === 'enable'
                ? basePath + '/enable-notification'
                : basePath + '/disable-notification';

            const hiddenField = document.createElement('input');
            hiddenField.type = 'hidden';
            hiddenField.name = 'type';
            hiddenField.value = notificationType;

            form.appendChild(hiddenField);
            document.body.appendChild(form);
            form.submit();
        }

        document.querySelector("#emailTemplateForm").addEventListener("submit", function(event) {
            const selectedType = document.querySelector("#templateSelect").value;
            document.querySelector("#selectedTypeInput").value = selectedType;
        });

        window.addEventListener('DOMContentLoaded', () => {
            const selectedTypeFromServer = /*[[${selectedType}]]*/ 'ORDER_ASSEMBLY';
            const selectedType = selectedTypeFromServer || document.querySelector("#templateSelect").value;

            document.querySelector("#templateSelect").value = selectedType;
            showSelectedTemplate(selectedType);
        });
    </script>
</div>

</body>
</html>
