<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

    <section class="section">
        <div class="container">
            <h2 th:text="#{financial.report.title} + ' ' + ${dateFrom} + ' - ' + ${dateTo}"></h2>

            <form method="get" th:action="@{/dashboard/reports}" class="box mb-4">
                <div class="field is-grouped is-flex-wrap-wrap">
                    <div class="control">
                        <label class="label" th:text="#{reports.from}"></label>
                        <input type="date" class="input" name="dateFrom" th:value="${dateFrom}" required>
                    </div>
                    <div class="control">
                        <label class="label" th:text="#{reports.to}"></label>
                        <input type="date" class="input" name="dateTo" th:value="${dateTo}" required>
                    </div>
                    <div class="control is-align-self-flex-end">
                        <button class="button is-link mt-5" type="submit" th:text="#{reports.show}"></button>
                    </div>
                </div>
            </form>

            <!-- Chart Section -->
            <div class="columns is-multiline mb-5">
                <div class="column is-half">
                    <h3 th:text="#{reports.sales.volume}"></h3>
                    <div class="box is-flex is-flex-direction-column is-justify-content-center">
                        <canvas id="salesVolumeChart"></canvas>
                    </div>
                </div>

                <div class="column is-half">
                    <h3 th:text="#{report.number.of.orders}"></h3>
                    <div class="box is-flex is-flex-direction-column is-justify-content-center">
                        <canvas id="numberOfOrdersChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="columns is-multiline">
                <div class="column is-half">
                    <h3 th:text="#{reports.number.of.orders.by.provider}"></h3>
                    <div class="box">
                        <canvas id="numberOfOrdersByProviderChart"></canvas>
                    </div>
                </div>

                <div class="column is-half">
                    <h3 th:text="#{reports.delivery.costs}"></h3>
                    <div class="box">
                        <canvas id="deliveryCostsChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="buttons">
                <a class="button is-link"
                   th:href="@{'/dashboard/reports/ordersExport?dateFrom=' + ${dateFrom} + '&dateTo=' + ${dateTo}}"
                   th:text="#{reports.orders.export}"></a>

                <a class="button is-link"
                   th:href="@{'/dashboard/reports/googleOfflineConversionsExport?dateFrom=' + ${dateFrom} + '&dateTo=' + ${dateTo}}"
                   th:text="#{reports.orders.google.offline.conversions}"></a>
            </div>
        </div>
    </section>

    <script th:inline="javascript">
        const totalNumberOfOrders = [[${report.totalNumberOfOrders}]];
        const totalPrice = [[${report.totalPrice}]];
        const totalCost = [[${report.totalCost}]];
        const totalProfit = [[${report.totalProfit}]];

        const providerLabels = [[${providerNames}]];
        const providerSales = [[${providerSales}]];

        const totalDeliveries = [[${report.totalDeliveries}]];
        const totalShippingCost = [[${report.totalShippingCost}]];
        const totalPaymentCost = [[${report.totalPaymentCost}]];

        new Chart(document.getElementById('numberOfOrdersChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: [ [[#{reports.total.number.of.orders}]] ],  // fixed quoting
                datasets: [{
                    label: [[#{report.number.of.orders}]],
                    data: [totalNumberOfOrders],
                    backgroundColor: 'rgba(75, 192, 192, 0.6)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1,
                    barThickness: 150
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        new Chart(document.getElementById('numberOfOrdersByProviderChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: providerLabels,
                datasets: [{
                    label: [[#{report.number.of.orders}]],
                    data: providerSales,
                    backgroundColor: 'rgba(153, 102, 255, 0.6)',
                    borderColor: 'rgba(153, 102, 255, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        new Chart(document.getElementById('salesVolumeChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: [
                    [[#{'reports.total.price'}]],
                    [[#{'reports.total.cost'}]],
                    [[#{'reports.total.profit'}]]
                ],
                datasets: [{
                    label: [[#{'reports.amount'}]],
                    data: [totalPrice, totalCost, totalProfit],
                    backgroundColor: [
                        'rgba(54, 162, 235, 0.6)',
                        'rgba(255, 206, 86, 0.6)',
                        'rgba(75, 192, 192, 0.6)'
                    ],
                    borderColor: [
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 206, 86, 1)',
                        'rgba(75, 192, 192, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        new Chart(document.getElementById('deliveryCostsChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: [
                    [[#{'reports.total.shipping.cost'}]],
                    [[#{'reports.total.payment.cost'}]]
                ],
                datasets: [{
                    label: [[#{'reports.total.deliveries'}]] + ': ' + totalDeliveries,
                    data: [totalShippingCost, totalPaymentCost],
                    backgroundColor: [
                        'rgba(255, 159, 64, 0.6)',
                        'rgba(153, 102, 255, 0.6)'
                    ],
                    borderColor: [
                        'rgba(255, 159, 64, 1)',
                        'rgba(153, 102, 255, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    </script>
</div>
</body>
</html>
