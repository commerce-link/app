<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

    <section class="section">
        <div class="container">
            <h2 th:text="#{financial.report.title} + ' ' + ${dateFrom} + ' - ' + ${dateTo}"></h2>

            <form method="get" th:action="@{/dashboard/reports}" class="box mb-4">
                <div class="field is-grouped is-flex-wrap-wrap">
                    <div class="control">
                        <label class="label" th:text="#{reports.from}"></label>
                        <input type="date" class="input" name="dateFrom" th:value="${dateFrom}" required>
                    </div>
                    <div class="control">
                        <label class="label" th:text="#{reports.to}"></label>
                        <input type="date" class="input" name="dateTo" th:value="${dateTo}" required>
                    </div>
                    <div class="control is-align-self-flex-end">
                        <button class="button is-link mt-5" type="submit" th:text="#{reports.show}"></button>
                    </div>
                </div>
            </form>

            <!-- Chart Section -->
            <div class="columns is-multiline mb-5">
                <div class="column is-half">
                    <h3 th:text="#{reports.sales.volume}"></h3>
                    <div class="box is-flex is-flex-direction-column is-justify-content-center">
                        <canvas id="salesVolumeChart"></canvas>
                    </div>
                </div>

                <div class="column is-half">
                    <h3 th:text="#{reports.number.of.orders.own}"></h3>
                    <div class="box is-flex is-flex-direction-column is-justify-content-center">
                        <canvas id="numberOfOrdersChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="columns is-multiline mb-5">
                <div class="column is-half">
                    <h3 th:text="#{reports.sales.volume.marketplace}"></h3>
                    <div class="box is-flex is-flex-direction-column is-justify-content-center">
                        <canvas id="salesVolumeMarketplaceChart"></canvas>
                    </div>
                </div>

                <div class="column is-half">
                    <h3 th:text="#{reports.number.of.orders.marketplace}"></h3>
                    <div class="box is-flex is-flex-direction-column is-justify-content-center">
                        <canvas id="numberOfOrdersMarketplaceChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="columns is-multiline">
                <div class="column is-half">
                    <h3 th:text="#{reports.number.of.orders.by.provider}"></h3>
                    <div class="box">
                        <canvas id="numberOfOrdersByProviderChart"></canvas>
                    </div>
                </div>

                <div class="column is-half">
                    <h3 th:text="#{reports.delivery.costs}"></h3>
                    <div class="box">
                        <canvas id="deliveryCostsChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="buttons">
                <a class="button is-link"
                   th:href="@{'/dashboard/reports/ordersExport?dateFrom=' + ${dateFrom} + '&dateTo=' + ${dateTo}}"
                   th:text="#{reports.orders.export}"></a>

                <a class="button is-link"
                   th:href="@{'/dashboard/reports/googleOfflineConversionsExport?dateFrom=' + ${dateFrom} + '&dateTo=' + ${dateTo}}"
                   th:text="#{reports.orders.google.offline.conversions}"></a>
            </div>
        </div>
    </section>

    <script th:inline="javascript">
        const reportOwn = {
            totalNumberOfOrders: [[${reportOwn.totalNumberOfOrders}]],
            totalPrice: [[${reportOwn.totalPrice}]],
            totalCost: [[${reportOwn.totalCost}]],
            totalProfit: [[${reportOwn.totalProfit}]],
            totalDeliveries: [[${reportOwn.totalDeliveries}]],
            totalShippingCost: [[${reportOwn.totalShippingCost}]],
            totalPaymentCost: [[${reportOwn.totalPaymentCost}]]
        };
        const reportMarketplace = {
            totalNumberOfOrders: [[${reportMarketplace.totalNumberOfOrders}]],
            totalPrice: [[${reportMarketplace.totalPrice}]],
            totalCost: [[${reportMarketplace.totalCost}]],
            totalProfit: [[${reportMarketplace.totalProfit}]]
        };
        const providerLabels = [[${providerNames}]];
        const providerSales = [[${providerSales}]];

        const t = {
            numberOfOrders: [[#{report.number.of.orders}]],
            totalNumberOfOrders: [[#{reports.total.number.of.orders}]],
            amount: [[#{'reports.amount'}]],
            totalPrice: [[#{'reports.total.price'}]],
            totalCost: [[#{'reports.total.cost'}]],
            totalProfit: [[#{'reports.total.profit'}]],
            totalShippingCost: [[#{'reports.total.shipping.cost'}]],
            totalPaymentCost: [[#{'reports.total.payment.cost'}]],
            totalDeliveries: [[#{'reports.total.deliveries'}]]
        };

        const COLORS = {
            teal: '75, 192, 192',
            blue: '54, 162, 235',
            yellow: '255, 206, 86',
            purple: '153, 102, 255',
            orange: '255, 159, 64'
        };
        const salesVolumeColors = [COLORS.blue, COLORS.yellow, COLORS.teal];

        function createBarChart(canvasId, { labels, datasetLabel, data, color, barThickness }) {
            const rgba = (c, a) => Array.isArray(c) ? c.map(x => `rgba(${x}, ${a})`) : `rgba(${c}, ${a})`;
            const dataset = {
                label: datasetLabel,
                data,
                backgroundColor: rgba(color, 0.6),
                borderColor: rgba(color, 1),
                borderWidth: 1
            };
            if (barThickness) dataset.barThickness = barThickness;
            new Chart(document.getElementById(canvasId).getContext('2d'), {
                type: 'bar',
                data: { labels, datasets: [dataset] },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });
        }

        const salesVolumeLabels = [t.totalPrice, t.totalCost, t.totalProfit];
        const orderCountLabels = [t.totalNumberOfOrders];

        createBarChart('numberOfOrdersChart', {
            labels: orderCountLabels,
            datasetLabel: t.numberOfOrders,
            data: [reportOwn.totalNumberOfOrders],
            color: COLORS.teal,
            barThickness: 150
        });

        createBarChart('numberOfOrdersMarketplaceChart', {
            labels: orderCountLabels,
            datasetLabel: t.numberOfOrders,
            data: [reportMarketplace.totalNumberOfOrders],
            color: COLORS.teal,
            barThickness: 150
        });

        createBarChart('salesVolumeChart', {
            labels: salesVolumeLabels,
            datasetLabel: t.amount,
            data: [reportOwn.totalPrice, reportOwn.totalCost, reportOwn.totalProfit],
            color: salesVolumeColors
        });

        createBarChart('salesVolumeMarketplaceChart', {
            labels: salesVolumeLabels,
            datasetLabel: t.amount,
            data: [reportMarketplace.totalPrice, reportMarketplace.totalCost, reportMarketplace.totalProfit],
            color: salesVolumeColors
        });

        createBarChart('numberOfOrdersByProviderChart', {
            labels: providerLabels,
            datasetLabel: t.numberOfOrders,
            data: providerSales,
            color: COLORS.purple
        });

        createBarChart('deliveryCostsChart', {
            labels: [t.totalShippingCost, t.totalPaymentCost],
            datasetLabel: t.totalDeliveries + ': ' + reportOwn.totalDeliveries,
            data: [reportOwn.totalShippingCost, reportOwn.totalPaymentCost],
            color: [COLORS.orange, COLORS.purple]
        });
    </script>
</div>
</body>
</html>
