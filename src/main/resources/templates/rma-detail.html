<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

    <div class="box mb-5">
        <div class="columns is-vcentered">
            <div class="column">
                <p class="heading" th:text="#{rma.id}"></p>
                <p class="title is-5" th:text="${rma.rmaId}"></p>
            </div>
            <div class="column">
                <p class="heading" th:text="#{rma.order.id}"></p>
                <p class="title is-5" th:text="${rma.orderId}"></p>
            </div>
            <div class="column">
                <p class="heading" th:text="#{rma.created.at}"></p>
                <p class="title is-5" th:text="${rma.createdAt}"></p>
            </div>
        </div>
    </div>

    <!-- Row 1: RMA Information + RMA Events -->
    <div class="columns">
        <!-- RMA Information -->
        <div class="column is-half">
            <div class="box">
                <form th:action="@{/dashboard/rma/{rmaId}(rmaId=${rma.rmaId})}" method="post" th:object="${rma}" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{storeId}"/>
                    <input type="hidden" th:field="*{rmaId}"/>

                    <!-- Status -->
                    <div class="field">
                        <label class="label" th:text="#{rma.status}"></label>
                        <div class="control">
                            <div class="select">
                                <select th:field="*{status}" th:disabled="${isClosed}">
                                    <option th:each="status : ${rmaStatusTypes}" th:value="${status}" th:text="${status.localizedName}"
                                            th:disabled="${rma.status.name() == 'Processing' and status.name() == 'ItemsReceived'}">>
                                    </option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="field mt-3">
                        <label class="label" th:text="#{rma.email}"></label>
                        <div class="control">
                            <input class="input" type="email"
                                   th:field="*{email}"
                                   th:placeholder="#{rma.email.placeholder}" th:disabled="${isClosed}" required>
                        </div>
                    </div>

                    <!-- Insurance Level -->
                    <div class="field mt-3">
                        <label class="label" th:text="#{rma.insurance.amount}"></label>
                        <div class="control">
                            <input class="input" type="number" step="0.01"
                                   th:field="*{shippingInsurance}"
                                   th:placeholder="#{rma.insurance.amount.placeholder}" th:disabled="${isClosed}" required>
                        </div>
                    </div>

                    <!-- Rejection Reason -->
                    <div class="field mt-3">
                        <label class="label" th:text="#{rma.reject.reason.if.reject}"></label>
                        <textarea class="textarea"
                                  rows="4"
                                  th:field="*{rejectionReason}"
                                  th:disabled="${isClosed}"
                                  th:placeholder="#{rma.reject.reason.placeholder}"></textarea>
                    </div>

                    <!-- RMA Link -->
                    <div class="field">
                        <label class="label" th:text="#{offers.link.for.client}"></label>
                        <div class="control is-flex" style="gap: 8px; align-items: center;">
                            <input class="input"
                                   type="text"
                                   id="rmaLinkInput"
                                   th:value="${rma.createClientRmaUrl(backofficeDomain)}"
                                   readonly
                                   style="text-decoration: underline; cursor: pointer;"
                                   onclick="openRmaLink()"/>
                            <button class="button is-small is-info" type="button"
                                    onclick="copyRmaLink()" th:text="#{general.copy}"></button>
                        </div>
                    </div>

                    <!-- Media -->
                    <div class="field">
                        <label class="label" th:text="#{rma.media}"></label>

                        <div class="mt-3" style="display:flex; flex-wrap:wrap; gap:16px;">
                            <div th:each="media,iterStat : ${rma.media}" class="media-box" style="position:relative;">
                                <input type="hidden" name="existingMedia" th:value="${media}" th:disabled="${isClosed}"/>
                                <button type="button"
                                        class="rma-media-delete-btn"
                                        style="position:absolute; top:6px; right:6px; background:none; border:none; cursor:pointer; color:#e74c3c;z-index:10"
                                        th:disabled="${isClosed}">
                                    <i class="fas fa-times"></i>
                                </button>

                                <!-- Image preview -->
                                <div th:if="${#strings.endsWith(#strings.toLowerCase(media), '.jpg') or #strings.endsWith(#strings.toLowerCase(media), '.jpeg') or #strings.endsWith(#strings.toLowerCase(media), '.png') or #strings.endsWith(#strings.toLowerCase(media), '.gif')}">
                                    <a th:href="@{'/rma/' + ${rma.rmaId} + '/media/' + ${media.substring(media.lastIndexOf('/') + 1)}}"
                                       target="_blank"
                                       style="text-decoration:none; color:inherit;">
                                        <img th:src="@{'/rma/' + ${rma.rmaId} + '/media/' + ${media.substring(media.lastIndexOf('/') + 1)}}"
                                             style="border:1px solid #ddd; max-width:100%; max-height:150px; border-radius:4px;" />
                                    </a>
                                </div>

                                <!-- PDF -->
                                <div th:if="${#strings.endsWith(#strings.toLowerCase(media), '.pdf')}" class="pdf-box" style="text-align:center;">
                                    <a th:href="@{'/rma/' + ${rma.rmaId} + '/media/' + ${media.substring(media.lastIndexOf('/') + 1)}}"
                                       target="_blank"
                                       style="text-decoration:none; color:inherit;">

                                        <div style="border:1px solid #ddd; border-radius:8px; padding:16px; width:130px; height:150px;background:#fafafa;">
                                            <i class="fas fa-file-pdf fa-3x" style="color:#e74c3c;"></i>
                                            <div style="font-size:13px; color:#333; word-break:break-word;"
                                                 th:text="${media.substring(media.lastIndexOf('/') + 1)}"></div>
                                        </div>
                                    </a>
                                </div>

                                <!-- Video preview -->
                                <div th:if="${#strings.endsWith(#strings.toLowerCase(media), '.mov') or #strings.endsWith(#strings.toLowerCase(media), '.mp4') or #strings.endsWith(#strings.toLowerCase(media), '.avi') or #strings.endsWith(#strings.toLowerCase(media), '.mkv')}">
                                    <a th:href="@{'/rma/' + ${rma.rmaId} + '/media/' + ${media.substring(media.lastIndexOf('/') + 1)}}"
                                       target="_blank"
                                       style="text-decoration:none; color:inherit;">
                                        <video th:src="@{'/rma/' + ${rma.rmaId} + '/media/' + ${media.substring(media.lastIndexOf('/') + 1)}}"
                                               controls style="border:1px solid #ddd; max-width:200px; max-height:150px; border-radius:4px;"></video>
                                    </a>
                                </div>
                            </div>
                        </div>

                        <div class="mt-3">
                            <input type="file" name="rmaMedia" multiple
                                   accept=".jpg,.jpeg,.png,.gif,.pdf,.mp4,.mov,.avi,.mkv" th:disabled="${isClosed}">
                            <p class="help" th:text="#{rma.media.upload.description}"></p>
                        </div>
                    </div>

                    <div class="field">
                        <label class="checkbox">
                            <input type="checkbox" th:field="*{emailNotificationsEnabled}" th:disabled="${isClosed}">
                            <span th:text="#{order.email.notifications}"></span>
                        </label>
                    </div>

                    <div class="control">
                        <button type="submit" class="button is-link is-small" th:text="#{general.save}" th:disabled="${isClosed}"></button>
                    </div>
                </form>
            </div>
        </div>

        <!-- RMA Events -->
        <div class="column is-half">
            <div class="box">
                <table class="table is-fullwidth">
                    <thead>
                    <tr>
                        <th th:text="#{order.event.type}"></th>
                        <th th:text="#{order.event.name}"></th>
                        <th th:text="#{order.event.date}"></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="event : ${rma.rmaEvents}">
                        <td th:text="${event.type}"></td>
                        <td th:text="${event.name}"></td>
                        <td th:text="${#temporals.format(event.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Row 2: RMA Items -->
    <form id="rmaItemsForm" method="post" th:object="${rmaItemsForm}" th:attr="data-rma-id=${rma.rmaId}">
        <h2 class="subtitle" th:text="#{rma.items}"></h2>
        <div class="box">
            <div class="table-container mb-4">
                <table class="table is-fullwidth is-striped">
                    <thead>
                    <tr>
                        <th th:text="#{order.item.select}"></th>
                        <th>ID</th>
                        <th th:text="#{rma.desired.resolution}"></th>
                        <th th:text="#{rma.actual.resolution}"></th>
                        <th th:text="#{rma.item.name}"></th>
                        <th th:text="#{rma.quantity}"></th>
                        <th th:text="#{general.delivery.id}"></th>
                        <th th:text="#{fulfilment.ean}"></th>
                        <th th:text="#{product.manufacturer.code}"></th>
                        <th th:text="#{order.item.price}"></th>
                        <th th:text="#{order.item.cost}"></th>
                        <th th:text="#{order.item.serial.no}"></th>
                        <th th:text="#{rma.status}"></th>
                        <th th:text="#{rma.reason}"></th>
                        <th th:text="#{order.item.comment}"></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item, iterStat : *{rmaItems}">
                        <td>
                            <input type="checkbox" th:field="*{rmaItems[__${iterStat.index}__].selected}" th:disabled="${isClosed}" />
                            <input type="hidden" th:field="*{rmaItems[__${iterStat.index}__].rmaId}" readonly />
                            <input type="hidden" th:field="*{rmaItems[__${iterStat.index}__].rmaItemId}" readonly />
                            <input type="hidden" th:field="*{rmaItems[__${iterStat.index}__].itemId}" readonly />
                            <input type="hidden" th:field="*{rmaItems[__${iterStat.index}__].tax}" readonly />
                        </td>
                        <td>
                            <a th:href="@{/dashboard/rma/{rmaId}/items/{rmaItemId}(rmaId=${item.rmaId}, rmaItemId=${item.rmaItemId})}"
                               th:text="${#strings.substring(item.rmaItemId, 0, 8)}"></a>
                        </td>
                        <td style="min-width: 80px;" th:text="${item.desiredResolution}"></td>
                        <td style="min-width: 80px;" th:text="${item.actualResolution}"></td>
                        <td style="min-width: 120px;" th:text="${item.name}"></td>
                        <td style="min-width: 80px;" th:text="${item.quantity}"></td>
                        <td style="min-width: 120px;" th:text="${item.shortenedDeliveryId}"></td>
                        <td style="min-width: 120px;" th:text="${item.ean}"></td>
                        <td style="min-width: 120px;" th:text="${item.manufacturerCode}"></td>
                        <td style="min-width: 80px;" th:text="${item.price}"></td>
                        <td style="min-width: 80px;" th:text="${item.unitCost.grossValue}"></td>
                        <td style="min-width: 120px;" th:text="${item.serialNo}"></td>
                        <td style="min-width: 120px;" th:text="${item.status}"></td>
                        <td style="min-width: 120px;" th:text="${item.reason}"></td>
                        <td style="min-width: 120px;" th:text="${item.comment}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="field is-grouped">
                <div class="control">
                    <div class="select is-small">
                        <select id="action-select" th:disabled="${isClosed}">
                            <option value="markItemsAsReceived" th:text="#{rma.items.mark.as.received}" ></option>
                            <option value="markItemsAsSentToDistributor" th:text="#{rma.items.mark.as.sent.to.distributor}"></option>
                            <option value="markItemsAsReturnedToClient" th:text="#{rma.items.mark.as.returned.to.client}"></option>
                            <option value="shipping/shipItemsToDistributor" th:text="#{rma.ship.to.distributor}"></option>
                            <option value="shipping/shipItemsToClient" th:text="#{rma.ship.to.client}"></option>
                            <option value="replaceItems?broken=false" th:text="#{rma.accept.working.items.replacement}"></option>
                            <option value="replaceItems?broken=true" th:text="#{rma.accept.broken.items.replacement}"></option>
                            <option value="acceptReturn" th:text="#{rma.accept.return}"></option>
                            <option value="checkSerialNumbers" th:text="#{rma.check.serial.numbers}"></option>
                            <option value="split" th:text="#{rma.split}">Split</option>
                            <option value="deleteItems" th:text="#{general.delete}"></option>
                        </select>
                    </div>
                    <button class="button is-primary is-small" type="button" onclick="handleRMAAction(this)" th:text="#{general.submit}" th:disabled="${isClosed}"></button>
                </div>
                <div class="control">
                    <button class="button is-info is-small" type="button" onclick="toggleRmaAddItemModal(true)" th:text="#{general.add}" th:disabled="${isClosed}"></button>
                </div>
            </div>

        </div>
    </form>

    <div id="rmaItemAddModalId" class="modal">
        <div class="modal-background" onclick="toggleRmaAddItemModal(false)"></div>
        <div class="modal-card" style="width:auto; max-width:90vw;">
            <header class="modal-card-head is-align-items-start">
                <p class="modal-card-title" th:text="#{rma.add.items}"></p>
                <button type="button" class="delete" aria-label="close" onclick="toggleRmaAddItemModal(false)"></button>
            </header>
            <section class="modal-card-body">
                <form id="rmaAddItemForm" th:action="@{/dashboard/rma/{rmaId}/add-item(rmaId=${rma.rmaId})}" method="post">
                    <div class="field is-grouped is-flex-wrap-nowrap" style="gap:10px; align-items:center; flex-wrap:nowrap;">
                        <div class="control" style="max-width: 40%">
                            <div class="select">
                                <select name="orderItemId" id="orderItemSelect" required onchange="updateRmaQtyMax()">
                                    <option value="" th:text="#{general.select}"></option>
                                    <option th:each="orderItem : ${remainingOrderItems}" th:value="${orderItem.itemId}"
                                            th:text="${orderItem.name}" th:attr="data-maxqty=${orderItem.qty}">
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="control">
                            <input id="rmaQuantityInput" class="input" type="number" name="quantity" min="1" value="1" style="width:80px;">
                        </div>
                        <div class="control">
                            <div class="select">
                                <select name="desiredResolution" required>
                                    <option th:each="resolution : ${rmaResolutionsTypes}" th:value="${resolution}"
                                            th:text="${resolution.localizedName}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="control" style="flex: 1">
                            <input class="input" type="text" name="reason" th:placeholder="#{rma.reason.placeholder}" style="min-width:200px;">
                        </div>
                    </div>
                </form>
            </section>
            <footer class="modal-card-foot">
                <button class="button is-primary" type="button" onclick="submitAddRmaItem(event)" th:text="#{general.add}" th:disabled="${isClosed}"></button>
                <button class="button" type="button" onclick="toggleRmaAddItemModal(false)" th:text="#{general.close}"></button>
            </footer>
        </div>
    </div>

    <div id="splitModal" class="modal">
        <div class="modal-background" onclick="hideSplitModal()"></div>
        <div class="modal-card">
            <header class="modal-card-head">
                <p class="modal-card-title" th:text="#{rma.split.title}">Split RMA Item</p>
                <button class="delete" aria-label="close" onclick="hideSplitModal()"></button>
            </header>
            <section class="modal-card-body">
                <form id="splitForm" method="post">
                    <div class="field">
                        <label class="label" th:text="#{rma.split.qty1}">Quantity for first item</label>
                        <div class="control">
                            <input class="input" type="number" name="qty1" min="1" value="1" required oninput="updateQty2()" id="qty1Input" />
                        </div>
                    </div>
                    <div class="field">
                        <label class="label" th:text="#{rma.split.qty2}">Quantity for second item</label>
                        <div class="control">
                            <input class="input" type="number" name="qty2" min="1" value="1" required readonly id="qty2Input" />
                        </div>
                    </div>
                    <input type="hidden" id="originalQtyInput" value="2" />
                    <div class="field is-grouped">
                        <div class="control">
                            <button class="button is-link" type="submit" th:text="#{rma.split}">Split</button>
                        </div>
                        <div class="control">
                            <button class="button is-light" type="button" onclick="hideSplitModal()" th:text="#{rma.split.cancel}">Cancel</button>
                        </div>
                    </div>
                </form>
            </section>
        </div>
    </div>

    <!-- Row 3: Shipping Details -->
    <div class="columns mt-5">
        <div class="column is-half">
            <h2 class="subtitle" th:text="#{order.shipping.details}"></h2>

            <div class="box">
                <table class="table is-fullwidth is-narrow">
                    <tbody>
                    <tr>
                        <th th:text="#{person.name}"></th>
                        <td th:text="${rma.shippingDetails?.name}"></td>
                    </tr>
                    <tr>
                        <th th:text="#{person.surname}"></th>
                        <td th:text="${rma.shippingDetails?.surname}"></td>
                    </tr>
                    <tr>
                        <th th:text="#{address.street}"></th>
                        <td th:text="${rma.shippingDetails?.streetAndNumber}"></td>
                    </tr>
                    <tr>
                        <th th:text="#{address.postal.code}"></th>
                        <td th:text="${rma.shippingDetails?.postalCode}"></td>
                    </tr>
                    <tr>
                        <th th:text="#{address.city}"></th>
                        <td th:text="${rma.shippingDetails?.city}"></td>
                    </tr>
                    <tr>
                        <th th:text="#{address.country}"></th>
                        <td th:text="${rma.shippingDetails?.country}"></td>
                    </tr>
                    <tr>
                        <th th:text="#{person.email}"></th>
                        <td th:text="${rma.shippingDetails?.email}"></td>
                    </tr>
                    <tr>
                        <th th:text="#{person.phone}"></th>
                        <td th:text="${rma.shippingDetails?.phone}"></td>
                    </tr>
                    <tr th:if="${rma.shippingDetails?.companyName}">
                        <th th:text="#{company.name}"></th>
                        <td th:text="${rma.shippingDetails.companyName}"></td>
                    </tr>
                    </tbody>
                </table>

                <!-- Edit button -->
                <a th:if="${!isClosed}"
                   class="button is-primary is-small"
                   th:href="@{/dashboard/rma/{rmaId}/shipping(rmaId=${rma.rmaId})}"
                   th:text="#{general.edit}">
                </a>
            </div>
        </div>

        <div class="column is-half">
            <h2 class="subtitle" th:text="#{order.shipments}"></h2>

            <div class="box">
                <table class="table is-fullwidth">
                    <thead>
                    <tr>
                        <th th:text="#{order.shipment.type}"></th>
                        <th th:text="#{order.shipment.tracking.no}"></th>
                        <th th:text="#{order.shipment.carrier}"></th>
                        <th th:text="#{order.shipment.shipped.at}"></th>
                        <th th:text="#{order.shipment.delivered.at}"></th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="shipment : ${rma.shipments}">
                        <td th:text="${shipment.type}"></td>
                        <td th:if="${shipment.trackingUrl}"><a th:href="${shipment.trackingUrl}" th:text="${shipment.trackingNo}" target="_blank"></a></td>
                        <td th:unless="${shipment.trackingUrl}" th:text="${shipment.trackingNo}"></td>
                        <td th:text="${shipment.carrier}"></td>
                        <td th:text="${shipment.shippedAt != null ? #temporals.format(shipment.shippedAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                        <td th:text="${shipment.deliveredAt != null ? #temporals.format(shipment.deliveredAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                    </tr>
                    </tbody>
                </table>

                <div class="field is-grouped mt-3">
                    <div class="control">
                        <button class="button is-primary is-small"
                                type="button"
                                th:disabled="${isClosed}"
                                onclick="toggleEditRmaShipmentsModal(true)"
                                th:text="#{general.edit}">
                        </button>
                    </div>
                </div>
            </div>

            <div id="editRmaShipmentsModal" class="modal">
                <div class="modal-background" onclick="toggleEditRmaShipmentsModal(false)"></div>

                <div class="modal-card is-large" style="width: 60vw">
                    <header class="modal-card-head">
                        <p class="modal-card-title" th:text="#{order.shipments}"></p>
                        <button class="delete" onclick="toggleEditRmaShipmentsModal(false)"></button>
                    </header>

                    <form th:action="@{/dashboard/rma/{rmaId}/updateShipments(rmaId=${rma.rmaId})}"
                          th:object="${rma}"
                          method="post">

                        <section class="modal-card-body">
                            <table class="table is-fullwidth">
                                <thead>
                                <tr>
                                    <th th:text="#{order.shipment.type}"></th>
                                    <th th:text="#{order.shipment.tracking.no}"></th>
                                    <th th:text="#{order.shipment.carrier}"></th>
                                    <th th:text="#{order.shipment.tracking.url}"></th>
                                    <th th:text="#{order.shipment.shipped.at}"></th>
                                    <th th:text="#{order.shipment.delivered.at}"></th>
                                </tr>
                                </thead>

                                <tbody id="editRmaShipmentsBody">
                                <tr th:each="shipment, i : *{shipments}">
                                    <td>
                                        <div class="select is-fullwidth">
                                            <select th:field="*{shipments[__${i.index}__].type}">
                                                <option th:each="type : ${shipmentTypes}"
                                                        th:value="${type}"
                                                        th:text="${type}">
                                                </option>
                                            </select>
                                        </div>
                                    </td>
                                    <td>
                                        <input class="input" th:field="*{shipments[__${i.index}__].trackingNo}">
                                    </td>
                                    <td>
                                        <input class="input" th:field="*{shipments[__${i.index}__].carrier}">
                                    </td>
                                    <td>
                                        <input class="input" th:field="*{shipments[__${i.index}__].trackingUrl}" type="url">
                                    </td>
                                    <td>
                                        <input class="input"
                                               type="datetime-local"
                                               th:name="'shipments[' + ${i.index} + '].shippedAt'"
                                               th:value="${rma.shipments[i.index].shippedAt != null
                                       ? #temporals.format(rma.shipments[i.index].shippedAt, 'yyyy-MM-dd''T''HH:mm')
                                       : ''}">
                                    </td>
                                    <td>
                                        <input class="input"
                                               type="datetime-local"
                                               th:name="'shipments[' + ${i.index} + '].deliveredAt'"
                                               th:value="${rma.shipments[i.index].deliveredAt != null
                                       ? #temporals.format(rma.shipments[i.index].deliveredAt, 'yyyy-MM-dd''T''HH:mm')
                                       : ''}">
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </section>

                        <footer class="modal-card-foot">
                            <button class="button is-primary" type="submit" th:text="#{general.save}">
                            </button>
                            <button class="button"
                                    type="button"
                                    onclick="toggleEditRmaShipmentsModal(false)"
                                    th:text="#{general.cancel}">
                            </button>
                        </footer>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="control">
        <a class="button is-light" th:href="@{/dashboard/rma}" th:text="#{general.cancel}"></a>
    </div>

    <div id="copyNotification"
         style="display:none; position:fixed; top:32px; right:32px; z-index:9999;
                background:#48c774; color:#fff; padding:16px 32px; border-radius:8px;
                box-shadow:0 2px 8px rgba(0,0,0,0.15); font-size:1.1em;">
        <span th:text="#{general.copied}"></span>
    </div>

    <style>
        /* Możesz przenieść do pliku CSS */
        #copyNotification {
            transition: opacity 0.3s;
        }

        input[readonly], textarea[readonly], select[readonly] {
            background-color: #f5f5f5;
            color: #555;
        }
        input[readonly]:focus, textarea[readonly]:focus {
            outline: none;
            box-shadow: none;
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.querySelectorAll(".rma-media-delete-btn").forEach(btn => {
                btn.addEventListener("click", function() {
                    const box = this.closest(".media-box");
                    if (box) box.remove();
                });
            });
        });

        function handleRMAAction(button) {
            const actionSelect = document.getElementById('action-select');
            const selectedAction = actionSelect.value;

            if (selectedAction === 'split') {
                submitSplitAction();
            } else {
                confirmSave(button, submitRMAItemsForm);
            }
        }

        function submitRMAItemsForm() {
            const form = document.getElementById('rmaItemsForm');
            const actionSelect = document.getElementById('action-select');
            const selectedAction = actionSelect.value;
            const rmaId = form.getAttribute('data-rma-id');

            const selectedItems = form.querySelectorAll('input[type="checkbox"]:checked');

            form.action = `/dashboard/rma/${rmaId}/${selectedAction}`;
            form.method = 'POST';
            form.submit();
        }

        function submitSplitAction() {
            const form = document.getElementById('rmaItemsForm');
            const selectedItems = form.querySelectorAll('input[type="checkbox"]:checked');

            if (selectedItems.length !== 1) {
                alert('Only one item can be split at a time.');
                return;
            }

            const selectedRow = selectedItems[0].closest('tr');
            const qtyInput = selectedRow.querySelector('input[name*=".quantity"]');
            const rmaItemIdInput = selectedRow.querySelector('input[name*=".rmaItemId"]');
            const qty = parseInt(qtyInput.value);
            const rmaItemId = rmaItemIdInput.value;

            if (qty < 2) {
                alert('Item quantity must be at least 2 to split.');
                return;
            }

            showSplitModal(rmaItemId, qty);
        }

        function showSplitModal(rmaItemId, originalQty) {
            const form = document.getElementById('rmaItemsForm');
            const rmaId = form.getAttribute('data-rma-id');
            const splitForm = document.getElementById('splitForm');

            splitForm.action = `/dashboard/rma/${rmaId}/items/${rmaItemId}/split`;
            document.getElementById('originalQtyInput').value = originalQty;
            document.getElementById('qty1Input').setAttribute('max', originalQty - 1);
            document.getElementById('qty1Input').value = 1;
            document.getElementById('qty2Input').setAttribute('max', originalQty - 1);
            document.getElementById('splitModal').classList.add('is-active');
            updateQty2();
        }

        function hideSplitModal() {
            document.getElementById('splitModal').classList.remove('is-active');
        }

        function updateQty2() {
            var qty1 = parseInt(document.getElementById('qty1Input').value) || 1;
            var originalQty = parseInt(document.getElementById('originalQtyInput').value);
            var qty2 = originalQty - qty1;
            if(qty2 < 1) qty2 = 1;
            document.getElementById('qty2Input').value = qty2;
        }

        function toggleRmaAddItemModal(show) {
            const modal = document.getElementById('rmaItemAddModalId');
            if (!modal) return;
            modal.classList.toggle('is-active', show);
        }

        function submitAddRmaItem(event) {
            event.preventDefault();
            const form = document.getElementById('rmaAddItemForm');
            form.method = 'POST';
            form.submit();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const shouldOpenModal = /*[[${openModal}]]*/ false;
            if (shouldOpenModal) toggleRmaAddItemModal(true);
        });

        function updateRmaQtyMax() {
            const select = document.getElementById('orderItemSelect');
            const selected = select.options[select.selectedIndex];
            const maxQty = selected.getAttribute('data-maxqty');

            const qtyInput = document.getElementById('rmaQuantityInput');
            qtyInput.max = maxQty || 1;
            qtyInput.value = Math.min(qtyInput.value, qtyInput.max);
        }

        function toggleEditRmaShipmentsModal(show) {
            const modal = document.getElementById('editRmaShipmentsModal');
            if (!modal) return;

            modal.classList.toggle('is-active', show);

            if (show) {
                const tbody = document.getElementById('editRmaShipmentsBody');
                if (tbody && !tbody.dataset.blankAdded) {
                    addEmptyRmaShipmentRow();
                    tbody.dataset.blankAdded = 'true';
                }
            }
        }
    </script>

    <script th:inline="javascript">
        function openRmaLink() {
            const input = document.getElementById('rmaLinkInput');
            window.open(input.value, '_blank', 'noopener');
        }

        function copyRmaLink() {
            const link = /*[[${rma.createClientRmaUrl(backofficeDomain)}]]*/ '';
            navigator.clipboard.writeText(link).then(function () {
                const notification = document.getElementById('copyNotification');
                notification.style.display = 'block';
                notification.style.opacity = '1';
                setTimeout(() => {
                    notification.style.opacity = '0';
                    setTimeout(() => notification.style.display = 'none', 300);
                }, 2000); // znika po 2 sekundach
            });
        }

        function addEmptyRmaShipmentRow() {
            const tbody = document.getElementById('editRmaShipmentsBody');
            if (!tbody) return;

            const index = tbody.querySelectorAll('tr').length;
            const shipmentTypes = /*[[${shipmentTypes}]]*/ [];

            const typeOptions = shipmentTypes
                .map(t => `<option value="${t}">${t}</option>`)
                .join('');

            const row = document.createElement('tr');
            row.innerHTML = `
        <td>
            <div class="select is-fullwidth">
                <select name="shipments[${index}].type">
                    ${typeOptions}
                </select>
            </div>
        </td>
        <td><input class="input" name="shipments[${index}].trackingNo"/></td>
        <td><input class="input" name="shipments[${index}].carrier"/></td>
        <td><input class="input" type="url" name="shipments[${index}].trackingUrl"/></td>
        <td><input class="input" type="datetime-local" name="shipments[${index}].shippedAt"/></td>
        <td><input class="input" type="datetime-local" name="shipments[${index}].deliveredAt"/></td>
    `;

            tbody.appendChild(row);
        }
    </script>
</div>
</body>
</html>
