<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>

<div layout:fragment="content">

    <section class="section">
        <div class="container">
            <h1 th:text="#{deliveries.preview.title}">Pending Deliveries</h1>

            <div th:if="${deliveries.isEmpty()}" class="notification is-info">
                <span th:text="#{deliveries.preview.empty}">No pending deliveries. All items have been allocated to deliveries.</span>
            </div>

            <div th:each="delivery, deliveryStat : ${deliveries}" class="box mb-5">
                <div class="level">
                    <div class="level-left">
                        <div class="level-item">
                            <h2 class="title is-4" th:text="${delivery.provider}"></h2>
                        </div>
                    </div>
                    <div class="level-right">
                        <div class="level-item">
                            <a th:href="${isSuperAdmin}
                                ? @{/dashboard/store/{storeId}/deliveries/create/{provider}(storeId=${storeId}, provider=${delivery.provider})}
                                : @{/dashboard/deliveries/create/{provider}(provider=${delivery.provider})}"
                               class="button is-primary" th:text="#{deliveries.preview.create}">Create Delivery</a>
                        </div>
                    </div>
                </div>

                <h4 class="title is-5" th:text="#{deliveries.items}">Items</h4>
                <table class="table is-fullwidth is-narrow">
                    <thead>
                    <tr>
                        <th th:text="#{general.name}">Name</th>
                        <th th:text="#{deliveries.orderedQty}">Qty</th>
                        <th th:text="#{general.ean}">EAN</th>
                        <th th:text="#{general.manufacturer.code}">MFN</th>
                        <th th:text="#{general.net.cost}">Unit Cost</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${delivery.items}">
                        <td th:text="${item.name}"></td>
                        <td th:text="${item.orderedQty}"></td>
                        <td th:text="${item.ean}"></td>
                        <td th:text="${item.mfn}"></td>
                        <td th:text="${#numbers.formatDecimal(item.unitCost, 1, 2)}"></td>
                    </tr>
                    </tbody>
                </table>

                <details class="mt-3">
                    <summary class="has-text-weight-semibold" th:text="#{deliveries.allocations}">Allocations</summary>
                    <div class="mt-2">
                        <table class="table is-fullwidth is-narrow">
                            <thead>
                            <tr>
                                <th th:text="#{deliveries.source}">Source</th>
                                <th th:text="#{general.name}">Name</th>
                                <th th:text="#{general.quantity}">Qty</th>
                                <th th:text="#{general.ean}">EAN</th>
                                <th th:text="#{general.manufacturer.code}">MFN</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="allocation : ${delivery.allocations}">
                                <td>
                                    <a th:href="@{${allocation.key.url}}" th:text="${allocation.key.name}" target="_blank"></a>
                                </td>
                                <td th:text="${allocation.name}"></td>
                                <td th:text="${allocation.qty}"></td>
                                <td th:text="${allocation.ean}"></td>
                                <td th:text="${allocation.mfn}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </details>
            </div>

        </div>
    </section>

</div>
</body>
</html>
