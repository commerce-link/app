<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  Reusable payments section (read-only table + Add modal + bulk Edit modal).
  Used by orderDetails and deliveryDetails.

  Caller passes:
    - payments             : List<Payment> for read-only display + edit table
    - addPaymentAction     : URL for "add payment" form (modal)
    - updatePaymentsAction : URL for bulk edit form (Spring binds input names to controller's @ModelAttribute)
    - expectedAmount       : double, unpaid amount for the modal hint
    - pendingPayment       : Payment or null (pre-fills modal)
    - paymentSources       : iterable of PaymentSource enum values
    - addDisabled          : boolean — disable Add/Edit buttons (e.g. completed Order)
    - editEnabled          : boolean — show Add/Edit buttons + render modals at all
    - mode                 : 'order' or 'delivery' — picks which checkbox set is shown in Add modal

  Note: edit form uses raw `name="payments[i].xxx"` (not th:field) so the fragment isn't tied
  to a specific model attribute name. Spring binds names to whatever @ModelAttribute the
  controller declares (e.g. "order" or "delivery"). Both controllers filter out
  `Payment::isComplete=false` rows on save — clearing amount+fee removes a payment.
-->
<div th:fragment="paymentsSection(payments, addPaymentAction, updatePaymentsAction, expectedAmount, pendingPayment, paymentSources, addDisabled, editEnabled, mode)">

    <h2 class="subtitle" th:text="#{order.payments}"></h2>
    <div class="box">
        <table class="table is-fullwidth">
            <thead>
            <tr>
                <th th:text="#{order.payment.source}"></th>
                <th th:text="#{payments.source.name}"></th>
                <th th:text="#{order.payment.amount}"></th>
                <th th:text="#{order.payment.processing.fee}"></th>
                <th th:text="#{order.payment.reference.no}"></th>
                <th th:text="#{order.payment.bank.transaction.no}"></th>
                <th th:text="#{order.payment.bank.transaction.date}"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="payment : ${payments}">
                <td th:text="${payment.source}"></td>
                <td th:text="${payment.name}"></td>
                <td th:text="${payment.amount}"></td>
                <td th:text="${payment.fee}"></td>
                <td th:text="${payment.referenceNo}"></td>
                <td th:text="${payment.bankTransactionNo}"></td>
                <td th:text="${payment.bankTransactionDate}"></td>
            </tr>
            </tbody>
        </table>

        <div class="field is-grouped" th:if="${editEnabled}">
            <div class="control">
                <button class="button is-primary is-small"
                        type="button"
                        th:disabled="${addDisabled}"
                        th:data-mode="${mode}"
                        onclick="openAddPaymentModalFromButton(this)"
                        th:text="#{order.payment.action.add}"></button>
            </div>
            <div class="control">
                <button class="button is-small"
                        type="button"
                        th:disabled="${addDisabled}"
                        onclick="togglePaymentsEditModal(true)"
                        th:text="#{general.edit}"></button>
            </div>
        </div>
    </div>

    <div th:if="${editEnabled}"
         th:replace="~{fragments/add-payment-modal :: addPaymentModal(
            formAction=${addPaymentAction},
            expectedAmount=${expectedAmount},
            pendingPayment=${pendingPayment},
            paymentSources=${paymentSources})}"></div>

    <div id="paymentsEditModal" class="modal" th:if="${editEnabled}">
        <div class="modal-background" onclick="togglePaymentsEditModal(false)"></div>
        <div class="modal-card" style="width: 60vw">
            <header class="modal-card-head">
                <p class="modal-card-title" th:text="#{order.payments}"></p>
                <button type="button" class="delete" aria-label="close" onclick="togglePaymentsEditModal(false)"></button>
            </header>

            <form th:action="${updatePaymentsAction}" method="post">
                <section class="modal-card-body">
                    <table class="table is-fullwidth">
                        <thead>
                        <tr>
                            <th th:text="#{order.payment.source}"></th>
                            <th th:text="#{payments.source.name}"></th>
                            <th th:text="#{order.payment.amount}"></th>
                            <th th:text="#{order.payment.processing.fee}"></th>
                            <th th:text="#{order.payment.reference.no}"></th>
                            <th th:text="#{order.payment.bank.transaction.no}"></th>
                            <th th:text="#{order.payment.bank.transaction.date}"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="payment, iterStat : ${payments}">
                            <td>
                                <input type="hidden"
                                       th:name="'payments[' + ${iterStat.index} + '].direction'"
                                       th:value="${payment.direction}"/>
                                <div class="select">
                                    <select th:name="'payments[' + ${iterStat.index} + '].source'">
                                        <option th:each="src : ${paymentSources}" th:value="${src}" th:text="${src}"
                                                th:selected="${src == payment.source}"></option>
                                    </select>
                                </div>
                            </td>
                            <td>
                                <input class="input" type="text"
                                       th:name="'payments[' + ${iterStat.index} + '].name'"
                                       th:value="${payment.name}"
                                       th:placeholder="#{payments.source.name.placeholder}"/>
                            </td>
                            <td>
                                <input class="input" type="number" step="0.01"
                                       th:name="'payments[' + ${iterStat.index} + '].amount'"
                                       th:value="${payment.amount}"
                                       th:placeholder="#{order.payment.amount.placeholder}"/>
                            </td>
                            <td>
                                <input class="input" type="number" step="0.01"
                                       th:name="'payments[' + ${iterStat.index} + '].fee'"
                                       th:value="${payment.fee}"
                                       th:placeholder="#{order.payment.processing.fee.placeholder}"/>
                            </td>
                            <td>
                                <input class="input" type="text"
                                       th:name="'payments[' + ${iterStat.index} + '].referenceNo'"
                                       th:value="${payment.referenceNo}"
                                       th:placeholder="#{order.payment.reference.no.placeholder}"/>
                            </td>
                            <td>
                                <input class="input" type="text"
                                       th:name="'payments[' + ${iterStat.index} + '].bankTransactionNo'"
                                       th:value="${payment.bankTransactionNo}"
                                       th:placeholder="#{order.payment.bank.transaction.no.placeholder}"/>
                            </td>
                            <td>
                                <input class="input" type="date"
                                       th:name="'payments[' + ${iterStat.index} + '].bankTransactionDate'"
                                       th:value="${payment.bankTransactionDate}"/>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                    <p class="help" th:text="#{payments.edit.help}"></p>
                </section>

                <footer class="modal-card-foot">
                    <button class="button is-primary" type="submit" th:text="#{general.save}"></button>
                    <button class="button" type="button" onclick="togglePaymentsEditModal(false)" th:text="#{general.cancel}"></button>
                </footer>
            </form>
        </div>
    </div>

</div>

</body>
</html>
