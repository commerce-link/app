<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="pagination(actionUrl, currentPage, hasNextPage, extraParams)">
    <div class="pagination-controls mt-5 mb-5" style="display: flex; justify-content: center;">
        <nav class="pagination is-small" role="navigation" aria-label="pagination"
             style="max-width: fit-content; margin: 0">

            <form th:action="${actionUrl}" method="get" style="display: inline;">
                <input type="hidden" name="page" th:value="${currentPage - 1}" />
                <div th:if="${extraParams != null}" th:each="entry : ${extraParams}">
                    <input type="hidden" th:name="${entry.key}" th:value="${entry.value}" />
                </div>
                <button th:text="#{general.pagination.previous}" class="pagination-previous"
                        type="submit"
                        th:disabled="${currentPage <= 1}"></button>
            </form>

            <form th:action="${actionUrl}" method="get" style="display: inline;">
                <input type="hidden" name="page" th:value="${currentPage + 1}" />
                <div th:if="${extraParams != null}" th:each="entry : ${extraParams}">
                    <input type="hidden" th:name="${entry.key}" th:value="${entry.value}" />
                </div>
                <button th:text="#{general.pagination.next}" class="pagination-next"
                        type="submit"
                        th:disabled="${!hasNextPage}"></button>
            </form>
        </nav>
    </div>
</div>
</body>
</html>
