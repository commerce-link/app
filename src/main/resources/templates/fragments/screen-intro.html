<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<button th:fragment="toggle" type="button" class="screen-intro-toggle cl-tooltip" data-intro-toggle
        th:attr="data-tooltip=#{intro.toggle}" onclick="toggleScreenIntro()">?</button>

<div th:fragment="panel(screen, icon)" class="screen-intro" th:attr="data-intro-panel=${screen}" hidden>
    <style>
        .screen-intro {
            position: relative;
            background: #ffffff;
            border: 1px solid #d5dcf5;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(72, 95, 199, 0.09);
            margin-bottom: 1.4rem;
            overflow: hidden;
            max-height: 640px;
            transition: max-height 0.35s ease, opacity 0.3s ease, margin-bottom 0.35s ease;
        }
        .screen-intro.is-closing {
            max-height: 0;
            opacity: 0;
            margin-bottom: 0;
            border-width: 0;
        }
        .screen-intro::before {
            content: "";
            position: absolute;
            inset: 0 auto 0 0;
            width: 5px;
            background: linear-gradient(180deg, #6c7fe0, #485fc7 55%, #3b4fae);
        }
        .screen-intro-body {
            display: flex;
            gap: 1.1rem;
            padding: 1.35rem 3rem 0 1.6rem;
        }
        .screen-intro-icon {
            flex: 0 0 auto;
            width: 2.9rem;
            height: 2.9rem;
            border-radius: 12px;
            background: linear-gradient(135deg, #6c7fe0, #3b4fae);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        .screen-intro-text { min-width: 0; }
        .screen-intro .screen-intro-text .screen-intro-eyebrow {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: #485fc7;
            margin: 0 0 0.2rem;
        }
        .screen-intro .screen-intro-text .screen-intro-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #363636;
            margin: 0 0 0.45rem;
        }
        .screen-intro .screen-intro-text .screen-intro-lead {
            margin: 0;
            font-size: 0.93rem;
            color: #6b7280;
            max-width: 72ch;
        }
        .screen-intro ul.screen-intro-list {
            list-style: none;
            margin: 0.9rem 0 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .screen-intro ul.screen-intro-list li {
            display: flex;
            gap: 0.6rem;
            align-items: flex-start;
            font-size: 0.9rem;
            max-width: 78ch;
            margin: 0;
        }
        .screen-intro-check {
            flex: 0 0 auto;
            width: 1.15rem;
            height: 1.15rem;
            margin-top: 0.1rem;
            border-radius: 50%;
            background: rgba(72, 199, 142, 0.15);
            color: #1f9d69;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
        }
        .screen-intro-footer {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            padding: 1.05rem 1.6rem 1.25rem 5.6rem;
        }
        .screen-intro-hint {
            font-size: 0.78rem;
            color: #6b7280;
        }
        .screen-intro-close {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            width: 1.7rem;
            height: 1.7rem;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: #6b7280;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .screen-intro-close:hover, .screen-intro-close:focus-visible {
            background: #eef1fb;
            color: #3b4fae;
            outline: none;
        }
        .screen-intro-toggle {
            width: 1.6rem;
            height: 1.6rem;
            border-radius: 50%;
            border: 1.5px solid #d5dcf5;
            background: #ffffff;
            color: #485fc7;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            transition: background 0.15s ease, border-color 0.15s ease;
        }
        .screen-intro-toggle:hover, .screen-intro-toggle:focus-visible {
            background: #eef1fb;
            border-color: #485fc7;
            outline: none;
        }
        .screen-intro-toggle.is-pulsing { animation: screen-intro-pulse 1.2s ease 2; }
        @keyframes screen-intro-pulse {
            0%   { box-shadow: 0 0 0 0 rgba(72, 95, 199, 0.45); }
            70%  { box-shadow: 0 0 0 9px rgba(72, 95, 199, 0); }
            100% { box-shadow: 0 0 0 0 rgba(72, 95, 199, 0); }
        }
        @media (prefers-reduced-motion: reduce) {
            .screen-intro { transition: none; }
            .screen-intro-toggle.is-pulsing { animation: none; }
        }
        @media screen and (max-width: 640px) {
            .screen-intro-body { padding-right: 2.6rem; }
            .screen-intro-footer { padding-left: 1.6rem; }
            .screen-intro-icon { display: none; }
        }
    </style>

    <button type="button" class="screen-intro-close" onclick="dismissScreenIntro()" th:attr="aria-label=#{general.close}">
        <i class="fas fa-times"></i>
    </button>
    <div class="screen-intro-body">
        <div class="screen-intro-icon" aria-hidden="true">
            <i th:class="${icon}"></i>
        </div>
        <div class="screen-intro-text">
            <p class="screen-intro-eyebrow" th:text="#{intro.eyebrow}"></p>
            <h3 class="screen-intro-title" th:text="#{${'intro.' + screen + '.title'}}"></h3>
            <p class="screen-intro-lead" th:text="#{${'intro.' + screen + '.lead'}}"></p>
            <ul class="screen-intro-list">
                <li th:each="i : ${#numbers.sequence(1, 3)}">
                    <span class="screen-intro-check" aria-hidden="true"><i class="fas fa-check"></i></span>
                    <span>
                        <strong th:text="#{${'intro.' + screen + '.item' + i}}"></strong>
                        <span th:text="'— ' + #{${'intro.' + screen + '.item' + i + '.text'}}"></span>
                    </span>
                </li>
            </ul>
        </div>
    </div>
    <div class="screen-intro-footer">
        <button type="button" class="button is-link" onclick="dismissScreenIntro()" th:text="#{intro.dismiss}"></button>
        <span class="screen-intro-hint" th:text="#{intro.hint}"></span>
    </div>

    <script>
        (function () {
            const panel = document.querySelector('[data-intro-panel]');
            const storageKey = 'cl-intro-seen-' + panel.getAttribute('data-intro-panel');

            if (!localStorage.getItem(storageKey)) {
                panel.hidden = false;
            }

            window.dismissScreenIntro = function () {
                localStorage.setItem(storageKey, 'true');
                panel.classList.add('is-closing');
                const toggle = document.querySelector('[data-intro-toggle]');
                if (toggle) {
                    toggle.classList.remove('is-pulsing');
                    void toggle.offsetWidth;
                    toggle.classList.add('is-pulsing');
                }
                setTimeout(function () {
                    panel.hidden = true;
                    panel.classList.remove('is-closing');
                }, 380);
            };

            window.toggleScreenIntro = function () {
                if (panel.hidden) {
                    panel.classList.add('is-closing');
                    panel.hidden = false;
                    requestAnimationFrame(function () {
                        requestAnimationFrame(function () {
                            panel.classList.remove('is-closing');
                        });
                    });
                } else {
                    window.dismissScreenIntro();
                }
            };
        })();
    </script>
</div>

</body>
</html>
