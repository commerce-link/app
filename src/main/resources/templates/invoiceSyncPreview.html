<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>

<div layout:fragment="content">

    <style>
        .invoice-sync-mapping tr.match-row td:first-child {
            border-left-width: 4px;
            border-left-style: solid;
        }
        .invoice-sync-mapping tr.match-exact td:first-child { border-left-color: hsl(141, 71%, 48%); }
        .invoice-sync-mapping tr.match-close td:first-child { border-left-color: hsl(48, 100%, 67%); }
        .invoice-sync-mapping tr.match-none  td:first-child { border-left-color: hsl(348, 86%, 61%); }
        .invoice-sync-mapping tr.match-exact { background-color: hsla(141, 71%, 48%, 0.08); }
        .invoice-sync-mapping tr.match-close { background-color: hsla(48, 100%, 67%, 0.10); }
        .invoice-sync-mapping tr.match-none  { background-color: hsla(348, 86%, 61%, 0.08); }
        .invoice-sync-mapping td { vertical-align: middle !important; }
        .invoice-sync-mapping select option { padding: 4px; }
        .invoice-sync-mapping .delta-cell {
            text-align: right;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }
        .invoice-sync-mapping .delta-zero  { color: hsl(141, 71%, 38%); }
        .invoice-sync-mapping .delta-close { color: hsl(38, 90%, 45%); font-weight: 600; }
        .invoice-sync-mapping .delta-far   { color: hsl(348, 86%, 51%); font-weight: 600; }
        .invoice-sync-mapping .delta-empty { color: #b5b5b5; }
        .invoice-sync-summary .tag { margin-right: 0.5rem; font-size: 0.95rem; }
    </style>

    <section class="section">
        <div class="container">

            <h2 th:text="#{invoiceSync.title}"></h2>

            <div class="columns">
                <div class="column is-half">
                    <div class="box">
                        <h4 class="title is-5" th:text="#{invoiceSync.invoiceDetails}"></h4>
                        <table class="table is-fullwidth is-narrow">
                            <tbody>
                            <tr>
                                <th th:text="#{invoiceSync.invoiceNumber}"></th>
                                <td>
                                    <a th:href="${preview.viewUrl}" target="_blank" th:text="${preview.invoiceNumber}"></a>
                                </td>
                            </tr>
                            <tr>
                                <th th:text="#{invoiceSync.orderNo}"></th>
                                <td th:text="${preview.externalDeliveryId}"></td>
                            </tr>
                            <tr>
                                <th th:text="#{invoiceSync.priceNet}"></th>
                                <td th:text="${#numbers.formatDecimal(preview.invoicePriceNet, 1, 2)} + ' ' + ${preview.currency}"></td>
                            </tr>
                            <tr>
                                <th th:text="#{invoiceSync.priceGross}"></th>
                                <td th:text="${#numbers.formatDecimal(preview.invoicePriceGross, 1, 2)} + ' ' + ${preview.currency}"></td>
                            </tr>
                            <tr>
                                <th th:text="#{invoiceSync.currency}"></th>
                                <td th:text="${preview.currency}"></td>
                            </tr>
                            <tr>
                                <th th:text="#{invoiceSync.exchangeRate}"></th>
                                <td th:text="${#numbers.formatDecimal(preview.exchangeRate, 1, 4)}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="column is-half">
                    <div class="box">
                        <h4 class="title is-5" th:text="#{invoiceSync.synchronization}"></h4>
                        <table class="table is-fullwidth is-narrow">
                            <colgroup>
                                <col style="width: 35%"/>
                                <col style="width: 25%"/>
                                <col style="width: 10%"/>
                                <col style="width: 30%"/>
                            </colgroup>
                            <tbody>
                            <tr>
                                <th th:text="#{invoiceSync.paymentStatus}"></th>
                                <td th:unless="${preview.paymentStatusDiffers}" colspan="3">
                                    <span th:if="${preview.invoicePaid}" class="tag is-success" th:text="#{invoiceSync.paid}"></span>
                                    <span th:unless="${preview.invoicePaid}" class="tag is-warning" th:text="#{invoiceSync.unpaid}"></span>
                                </td>
                                <td th:if="${preview.paymentStatusDiffers}">
                                    <span th:if="${preview.deliveryPaid}" class="tag is-success" th:text="#{invoiceSync.paid}"></span>
                                    <span th:unless="${preview.deliveryPaid}" class="tag is-warning" th:text="#{invoiceSync.unpaid}"></span>
                                </td>
                                <td th:if="${preview.paymentStatusDiffers}" class="has-text-centered">&rarr;</td>
                                <td th:if="${preview.paymentStatusDiffers}">
                                    <span th:if="${preview.invoicePaid}" class="tag is-success" th:text="#{invoiceSync.paid}"></span>
                                    <span th:unless="${preview.invoicePaid}" class="tag is-warning" th:text="#{invoiceSync.unpaid}"></span>
                                </td>
                            </tr>
                            <tr th:if="${preview.invoicePaymentToDate}">
                                <th th:text="#{invoiceSync.paymentToDate}"></th>
                                <td th:unless="${preview.paymentDueDateDiffers}" colspan="3">
                                    <span class="tag" th:text="${preview.invoicePaymentToDate}"></span>
                                </td>
                                <td th:if="${preview.paymentDueDateDiffers}">
                                    <span class="tag" th:text="${preview.deliveryPaymentDueDate} ?: '-'"></span>
                                </td>
                                <td th:if="${preview.paymentDueDateDiffers}" class="has-text-centered">&rarr;</td>
                                <td th:if="${preview.paymentDueDateDiffers}">
                                    <span class="tag is-info" th:text="${preview.invoicePaymentToDate}"></span>
                                </td>
                            </tr>
                            <tr th:if="${preview.invoiceShortcut}">
                                <th th:text="#{invoiceSync.provider}"></th>
                                <td th:unless="${preview.shortcutDiffers}" colspan="3">
                                    <span class="tag" th:text="${preview.invoiceShortcut}"></span>
                                </td>
                                <td th:if="${preview.shortcutDiffers}">
                                    <span class="tag" th:text="${preview.deliveryProvider} ?: '-'"></span>
                                </td>
                                <td th:if="${preview.shortcutDiffers}" class="has-text-centered">&rarr;</td>
                                <td th:if="${preview.shortcutDiffers}">
                                    <span class="tag is-info" th:text="${preview.invoiceShortcut}"></span>
                                </td>
                            </tr>
                            <tr th:if="${preview.priceNetDiffers}">
                                <th th:text="#{invoiceSync.priceNet}"></th>
                                <td>
                                    <span class="tag" th:text="${#numbers.formatDecimal(preview.deliveryTotalCostNet, 1, 2)} + ' PLN'"></span>
                                </td>
                                <td class="has-text-centered">&rarr;</td>
                                <td>
                                    <span class="tag is-info" th:text="${#numbers.formatDecimal(preview.invoicePriceNet, 1, 2)} + ' ' + ${preview.currency}"></span>
                                </td>
                            </tr>
                            <tr th:if="${preview.priceGrossDiffers}">
                                <th th:text="#{invoiceSync.priceGross}"></th>
                                <td>
                                    <span class="tag" th:text="${#numbers.formatDecimal(preview.deliveryTotalCostGross, 1, 2)} + ' PLN'"></span>
                                </td>
                                <td class="has-text-centered">&rarr;</td>
                                <td>
                                    <span class="tag is-info" th:text="${#numbers.formatDecimal(preview.invoicePriceGross, 1, 2)} + ' ' + ${preview.currency}"></span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <form th:action="@{/dashboard/deliveries/sync/apply}" th:object="${preview}" method="post">

                <input type="hidden" th:field="*{deliveryId}"/>
                <input type="hidden" th:field="*{externalDeliveryId}"/>
                <input type="hidden" th:field="*{invoiceId}"/>
                <input type="hidden" th:field="*{invoiceNumber}"/>
                <input type="hidden" th:field="*{currency}"/>
                <input type="hidden" th:field="*{exchangeRate}"/>
                <input type="hidden" th:field="*{invoiceShortcut}"/>
                <input type="hidden" th:field="*{deliveryProvider}"/>

                <div th:if="${preview.allExact}" class="notification is-success">
                    <strong th:text="#{invoiceSync.allExactBanner}"></strong>
                </div>

                <div th:if="${!preview.allExact and !preview.mappings.isEmpty()}" class="box invoice-sync-summary">
                    <span class="tag is-success is-medium" th:if="${preview.exactMatchCount > 0}">
                        <span>&#10003;</span>&nbsp;<span th:text="${preview.exactMatchCount} + ' ' + #{invoiceSync.summary.exact}"></span>
                    </span>
                    <span class="tag is-warning is-medium" th:if="${preview.closeMatchCount > 0}">
                        <span>~</span>&nbsp;<span th:text="${preview.closeMatchCount} + ' ' + #{invoiceSync.summary.close}"></span>
                    </span>
                    <span class="tag is-danger is-light is-medium" th:if="${preview.noMatchCount > 0}">
                        <span>&#9675;</span>&nbsp;<span th:text="${preview.noMatchCount} + ' ' + #{invoiceSync.summary.none}"></span>
                    </span>
                </div>

                <div class="box">
                    <h4 class="title is-5" th:text="#{invoiceSync.itemMapping}"></h4>
                    <table class="table is-fullwidth invoice-sync-mapping" data-cost-mode="unit">
                        <colgroup>
                            <col style="width: 23%"/>
                            <col style="width: 12%"/>
                            <col style="width: 5%"/>
                            <col style="width: 12%"/>
                            <col style="width: 40%"/>
                            <col style="width: 8%"/>
                        </colgroup>
                        <thead>
                        <tr>
                            <th th:text="#{general.name}"></th>
                            <th th:text="#{general.manufacturer.code}"></th>
                            <th th:text="#{general.quantity}"></th>
                            <th th:text="#{invoiceSync.deliveryUnitCost}"></th>
                            <th th:text="#{invoiceSync.invoicePosition}"></th>
                            <th th:text="#{invoiceSync.priceDelta}"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="mapping, stat : ${preview.mappings}"
                            th:classappend="${mapping.exact} ? 'match-row match-exact' : (${mapping.close} ? 'match-row match-close' : 'match-row match-none')"
                            th:attr="data-unit-cost=${mapping.unitCost}">
                            <td th:text="${mapping.name}" th:title="${mapping.name}"></td>
                            <td th:text="${mapping.mfn}"></td>
                            <td th:text="${mapping.qty}"></td>
                            <td th:text="${#numbers.formatDecimal(mapping.unitCost, 1, 2)} + ' PLN'"></td>
                            <td>
                                <input type="hidden" th:field="*{mappings[__${stat.index}__].mfn}"/>
                                <div class="select is-fullwidth">
                                    <select th:field="*{mappings[__${stat.index}__].selectedPositionId}">
                                        <option value="" th:text="#{invoiceSync.noMatch}">-- Brak dopasowania --</option>
                                        <option th:each="pos : ${preview.options}"
                                                th:value="${pos.id}"
                                                th:title="${pos.name}"
                                                th:attr="data-price-net=${pos.priceNet},data-total-net=${pos.priceNet * pos.qty}"
                                                th:text="${pos.qty} + ' &#215; ' + ${pos.name} + ' — ' + ${#numbers.formatDecimal(pos.priceNet, 1, 2)} + ' ' + ${pos.currency}">
                                        </option>
                                    </select>
                                </div>
                            </td>
                            <td class="delta-cell">—</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="box">
                    <h4 class="title is-5" th:text="#{invoiceSync.additionalCosts}"></h4>
                    <table class="table is-fullwidth invoice-sync-mapping" data-cost-mode="total">
                        <colgroup>
                            <col style="width: 23%"/>
                            <col style="width: 12%"/>
                            <col style="width: 5%"/>
                            <col style="width: 12%"/>
                            <col style="width: 40%"/>
                            <col style="width: 8%"/>
                        </colgroup>
                        <thead>
                        <tr>
                            <th th:text="#{general.name}"></th>
                            <th></th>
                            <th th:text="#{general.quantity}"></th>
                            <th th:text="#{invoiceSync.deliveryUnitCost}"></th>
                            <th th:text="#{invoiceSync.invoicePosition}"></th>
                            <th th:text="#{invoiceSync.priceDelta}"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:classappend="${preview.allExact or (preview.shippingCostPositionId != null and !preview.shippingCostPositionId.isBlank())} ? 'match-row match-exact' : 'match-row match-none'"
                            th:attr="data-unit-cost=${preview.shippingCost}">
                            <td th:text="#{invoiceSync.shippingCost}"></td>
                            <td>-</td>
                            <td>1</td>
                            <td th:text="${#numbers.formatDecimal(preview.shippingCost, 1, 2)} + ' PLN'"></td>
                            <td>
                                <div class="select is-fullwidth">
                                    <select th:field="*{shippingCostPositionId}">
                                        <option value="" th:text="#{invoiceSync.noMatch}">-- Brak dopasowania --</option>
                                        <option th:each="pos : ${preview.options}"
                                                th:value="${pos.id}"
                                                th:title="${pos.name}"
                                                th:attr="data-price-net=${pos.priceNet},data-total-net=${pos.priceNet * pos.qty}"
                                                th:text="${pos.qty} + ' &#215; ' + ${pos.name} + ' — ' + ${#numbers.formatDecimal(pos.priceNet, 1, 2)} + ' ' + ${pos.currency}">
                                        </option>
                                    </select>
                                </div>
                            </td>
                            <td class="delta-cell">—</td>
                        </tr>
                        <tr th:classappend="${preview.allExact or (preview.paymentCostPositionId != null and !preview.paymentCostPositionId.isBlank())} ? 'match-row match-exact' : 'match-row match-none'"
                            th:attr="data-unit-cost=${preview.paymentCost}">
                            <td th:text="#{invoiceSync.paymentCost}"></td>
                            <td>-</td>
                            <td>1</td>
                            <td th:text="${#numbers.formatDecimal(preview.paymentCost, 1, 2)} + ' PLN'"></td>
                            <td>
                                <div class="select is-fullwidth">
                                    <select th:field="*{paymentCostPositionId}">
                                        <option value="" th:text="#{invoiceSync.noMatch}">-- Brak dopasowania --</option>
                                        <option th:each="pos : ${preview.options}"
                                                th:value="${pos.id}"
                                                th:title="${pos.name}"
                                                th:attr="data-price-net=${pos.priceNet},data-total-net=${pos.priceNet * pos.qty}"
                                                th:text="${pos.qty} + ' &#215; ' + ${pos.name} + ' — ' + ${#numbers.formatDecimal(pos.priceNet, 1, 2)} + ' ' + ${pos.currency}">
                                        </option>
                                    </select>
                                </div>
                            </td>
                            <td class="delta-cell">—</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="field is-grouped">
                    <div class="control">
                        <button type="submit" class="button is-primary" th:text="#{invoiceSync.apply}"></button>
                    </div>
                </div>

            </form>

        </div>
    </section>

    <script th:inline="javascript">
        /*<![CDATA[*/
        (function () {
            const fmt = new Intl.NumberFormat('pl-PL', {minimumFractionDigits: 2, maximumFractionDigits: 2});

            function updateDelta(select) {
                const row = select.closest('tr');
                if (!row) return;
                const cell = row.querySelector('.delta-cell');
                if (!cell) return;

                const table = select.closest('table');
                const mode = table && table.dataset.costMode === 'total' ? 'data-total-net' : 'data-price-net';

                const opt = select.options[select.selectedIndex];
                const priceAttr = opt ? opt.getAttribute(mode) : null;
                const unitCost = parseFloat(row.dataset.unitCost);

                cell.classList.remove('delta-zero', 'delta-close', 'delta-far', 'delta-empty');

                if (priceAttr === null || priceAttr === '' || isNaN(unitCost)) {
                    cell.textContent = '—';
                    cell.classList.add('delta-empty');
                    return;
                }

                const delta = parseFloat(priceAttr) - unitCost;
                const rounded = Math.round(delta * 100) / 100;
                const sign = rounded > 0 ? '+' : (rounded < 0 ? '−' : '');
                cell.textContent = sign + fmt.format(Math.abs(rounded)) + ' PLN';

                const abs = Math.abs(rounded);
                if (abs < 0.005)      cell.classList.add('delta-zero');
                else if (abs <= 0.01) cell.classList.add('delta-close');
                else                  cell.classList.add('delta-far');
            }

            document.querySelectorAll('.invoice-sync-mapping select').forEach(function (select) {
                updateDelta(select);
                select.addEventListener('change', function () { updateDelta(select); });
            });
        })();
        /*]]>*/
    </script>

</div>
</body>
</html>
