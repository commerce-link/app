<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>

<div layout:fragment="content">

    <section class="section">
        <div class="container">

            <h1 class="title" th:text="#{store.categories.page.title}"></h1>
            <p class="subtitle is-6" th:text="#{store.categories.page.description}"></p>

            <div class="notification is-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="notification is-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

            <div class="box" th:if="${#lists.isEmpty(categoryNames)}">
                <p th:text="#{store.enabled.categories.unavailable}"></p>
            </div>

            <form th:if="${!#lists.isEmpty(categoryNames)}" th:action="@{/dashboard/store/categories}" method="post">
                <input type="hidden" name="storeId" th:value="${storeId}"/>

                <div class="box">
                    <div class="columns is-multiline">
                        <div class="column is-one-third" th:each="categoryName : ${categoryNames}">
                            <label class="checkbox">
                                <input type="checkbox" name="enabledCategories"
                                       th:value="${categoryName}"
                                       th:checked="${enabledCategories.contains(categoryName)}"/>
                                <span th:text="${categoryName}"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="field is-grouped">
                    <div class="control">
                        <button type="submit" class="button is-primary" th:text="#{general.save}"></button>
                    </div>
                    <div class="control">
                        <a th:href="@{${isSuperAdmin} ? '/dashboard/store/' + ${storeId} : '/dashboard/store'}"
                           class="button" th:text="#{general.cancel}"></a>
                    </div>
                </div>
            </form>

        </div>
    </section>

</div>

</body>
</html>
