<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>

<div layout:fragment="content">

    <style>
        input[readonly], textarea[readonly] {
            background-color: #f5f5f5 !important;
            color: #7a7a7a !important;
            cursor: not-allowed;
        }
    </style>

    <section class="section">
        <div class="container">

            <div class="box">
                <h3 class="title is-3" th:text="#{warehouse.edit.item}">Edit Warehouse Item</h3>
                <form id="editForm"
                      th:object="${warehouseItem}" method="post"
                      th:action="@{/dashboard/warehouse/items/{itemId}/save(itemId=${warehouseItem.itemId})}">
                    <input type="hidden" th:field="*{storeId}"/>

                    <div class="field">
                        <label class="label" th:text="#{warehouse.item.category}">Category</label>
                        <div class="control">
                            <div class="select">
                                <select th:field="*{category}">
                                    <option th:each="category : ${productCategories}" th:value="${category}"
                                            th:text="${category}"></option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{warehouse.item.name}">Name</label>
                        <div class="control">
                            <input class="input" type="text" th:field="*{name}" th:placeholder="#{warehouse.item.name}"
                                   placeholder="Name" required/>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{warehouse.item.quantity}">Quantity</label>
                        <div class="control">
                            <input class="input" type="number" th:field="*{qty}"
                                   th:placeholder="#{warehouse.item.quantity}" th:attr="readonly=${isEdit}"
                                   placeholder="Quantity" required/>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{warehouse.item.cost.net}">Net Cost</label>
                        <div class="control">
                            <input class="input" type="number" step="0.01" th:field="*{cost}"
                                   th:placeholder="#{warehouse.item.cost.net}" placeholder="Net Cost" required
                                   th:attr="readonly=${isEdit}"/>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{warehouse.item.tax}">Tax</label>
                        <div class="control">
                            <input class="input" type="number" step="0.01" th:field="*{tax}"
                                   th:placeholder="#{warehouse.item.tax}" placeholder="Tax" required
                                   th:attr="readonly=${isEdit}"/>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{warehouse.item.ean}">Ean</label>
                        <div class="control">
                            <input class="input" type="text" th:field="*{ean}" th:placeholder="#{warehouse.item.ean}"
                                   placeholder="Ean" required th:attr="readonly=${isEdit}"/>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{warehouse.item.manufacturer.code}">Manufacturer Code</label>
                        <div class="control">
                            <input class="input" type="text" th:field="*{manufacturerCode}"
                                   th:placeholder="#{warehouse.item.manufacturer.code}" placeholder="Manufacturer Code"
                                   th:attr="readonly=${isEdit}" required/>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{general.delivery.id}">Order No</label>
                        <div class="control">
                            <input class="input" type="text" th:field="*{deliveryId}"
                                   th:placeholder="#{general.delivery.id}" placeholder="Order No"
                                   th:attr="readonly=${isEdit}" required/>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{warehouse.item.serial.no}">Serial No</label>
                        <div class="control">
                            <input class="input" type="text" th:field="*{serialNo}"
                                   th:placeholder="#{warehouse.item.serial.no}" placeholder="Serial No">
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{warehouse.item.status}">Status</label>
                        <div class="control" th:if="${isEdit}">
                            <input class="input" type="text" th:value="${warehouseItem.status.localizedName}"
                                   readonly="readonly"/>
                            <input type="hidden" th:field="*{status}"/>
                        </div>
                        <div class="control" th:unless="${isEdit}">
                            <div class="select">
                                <select th:field="*{status}" id="statusSelect">
                                    <option th:each="status : ${fulfilmentStatuses}" th:value="${status}"
                                            th:text="${status.localizedName}"></option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{warehouse.item.comment}">Comment</label>
                        <div class="control">
                            <textarea class="textarea" th:field="*{comment}" th:placeholder="#{warehouse.item.comment}"
                                      placeholder="Comment"></textarea>
                        </div>
                    </div>

                    <div class="field is-grouped mt-5">
                        <div class="control">
                            <button class="button is-primary" type="submit" th:text="#{general.save}"></button>
                        </div>
                    </div>
                </form>
                <div class="field is-grouped mt-2" th:if="${warehouseItem.canBeDeleted()}">
                    <div class="control">
                        <form th:action="@{/dashboard/warehouse/items/{itemId}/delete(itemId=${warehouseItem.itemId})}"
                              method="post"
                              id="warehouseItemDeleteForm"
                              style="display:inline;"
                              onsubmit="event.preventDefault();">
                            <button type="submit" class="button is-danger" th:text="#{general.delete}"
                                    onclick="confirmSave(this)"></button>
                        </form>
                    </div>
                </div>

            </div>

        </div>
    </section>

</div>

</script>

</body>
</html>
