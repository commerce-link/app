<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>

<div layout:fragment="content">

    <section class="section">
        <div class="container is-max-desktop">

            <h2 class="title is-4" th:text="#{order.shipping.details}"></h2>

            <form th:action="@{/dashboard/rma/{rmaId}/updateShippingDetails(rmaId=${rma.rmaId})}"
                  th:object="${rma}"
                  method="post">

                <div class="box">
                    <div class="field">
                        <label class="label" th:text="#{person.name}"></label>
                        <input class="input" th:field="*{shippingDetails.name}" />
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{person.surname}"></label>
                        <input class="input" th:field="*{shippingDetails.surname}" />
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{address.street}"></label>
                        <input class="input" th:field="*{shippingDetails.streetAndNumber}" />
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{address.postal.code}"></label>
                        <input class="input" th:field="*{shippingDetails.postalCode}" />
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{address.city}"></label>
                        <input class="input" th:field="*{shippingDetails.city}" />
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{address.country}"></label>
                        <input class="input" th:field="*{shippingDetails.country}" />
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{person.email}"></label>
                        <input class="input" type="email" th:field="*{shippingDetails.email}" />
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{person.phone}"></label>
                        <input class="input" type="tel" th:field="*{shippingDetails.phone}" />
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{company.name}"></label>
                        <input class="input" th:field="*{shippingDetails.companyName}" />
                    </div>

                    <div class="field is-grouped mt-4">
                        <div class="control">
                            <button class="button is-primary" type="submit"
                                    th:text="#{general.save}">
                            </button>
                        </div>
                        <div class="control">
                            <a class="button"
                               th:href="@{/dashboard/rma/{rmaId}(rmaId=${rma.rmaId})}"
                               th:text="#{general.cancel}">
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </section>

</div>
</body>
</html>
