<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>

<div layout:fragment="content">
    <div th:if="${welcomeMessage}" class="notification is-info">
        <p class="has-text-weight-bold" th:text="#{dashboard.welcome.title}"></p>
        <p th:text="#{dashboard.welcome.body}"></p>
    </div>

    <h1 class="title" th:text="#{dashboard.welcome}"></h1>
</div>

</body>
</html>
