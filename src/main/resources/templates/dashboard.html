<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>

<div layout:fragment="content">
    <div th:if="${welcomeMessage}" class="notification is-info">
        <p class="has-text-weight-bold" th:text="#{dashboard.welcome.title}"></p>
        <p th:text="#{dashboard.welcome.body}"></p>
    </div>

    <div class="is-flex is-align-items-center mb-4" style="gap: 0.6rem">
        <h1 class="title mb-0" th:text="#{dashboard.welcome}"></h1>
        <button th:replace="~{fragments/screen-intro :: toggle}"></button>
    </div>

    <div th:replace="~{fragments/screen-intro :: panel('dashboard', 'fas fa-compass')}"></div>
</div>

</body>
</html>
