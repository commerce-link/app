<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>

<div layout:fragment="content">

    <div th:if="${hasExternalWarehouse}" class="notification is-info is-light">
        <span th:text="#{warehouse.external.wms.info}"></span>
    </div>

    <div class="notification has-background-grey-lighter">
        <strong th:text="#{warehouse.value.net} + ': '"></strong>
        <span th:text="${#numbers.formatDecimal(warehouseNetValue, 1, 2)} + ' PLN'"></span>
        <span class="mx-3">|</span>
        <strong th:text="#{warehouse.value.gross} + ': '"></strong>
        <span th:text="${#numbers.formatDecimal(warehouseGrossValue, 1, 2)} + ' PLN'"></span>
    </div>

    <div class="box">
        <h4 class="title is-5">Filter by Category and Status</h4>
        <div class="field is-grouped is-grouped-multiline" id="filterTags">
            <div class="control">
                <div class="tags has-addons">
                    <span class="tag is-info">Categories:</span>
                </div>
            </div>
            <div class="control" th:each="category : ${categories}">
                <div class="tags has-addons">
                    <a class="tag category-tag"
                       th:classappend="${#lists.contains(selectedCategories, category)} ? 'is-link' : 'is-link is-light'"
                       th:text="${category}"
                       th:data-category="${category}"
                       href="javascript:void(0)"></a>
                </div>
            </div>

            <div class="control">
                <div class="tags has-addons">
                    <span class="tag is-info">Statuses:</span>
                </div>
            </div>
            <div class="control" th:each="status : ${statuses}">
                <div class="tags has-addons">
                    <a class="tag status-tag"
                       th:classappend="${#lists.contains(selectedStatuses, status.name())} ? 'is-primary' : 'is-primary is-light'"
                       th:text="${enumI18n.localize(status)}"
                       th:data-status="${status.name()}"
                       href="javascript:void(0)"></a>
                </div>
            </div>

            <div class="control">
                <button class="button is-small is-danger is-light" id="clearFilters">
                    <span class="icon is-small"><i class="fas fa-times"></i></span>
                    <span>Clear Filters</span>
                </button>
            </div>
        </div>
    </div>

    <th:block th:if="${!#lists.isEmpty(deliveredItems)}">
        <div th:replace="~{fragments/warehouseItemsListFragment :: box(#{warehouse.in.stock}, ${deliveredItems}, ${DeliveredStatus}, true)}"></div>
    </th:block>
    <th:block th:if="${!#lists.isEmpty(orderedItems)}">
        <div th:replace="~{fragments/warehouseItemsListFragment :: box(#{warehouse.ordered}, ${orderedItems}, ${OrderedStatus}, false)}"></div>
    </th:block>
    <th:block th:if="${!#lists.isEmpty(allocationItems)}">
        <div th:replace="~{fragments/warehouseItemsListFragment :: box(#{warehouse.ordering}, ${allocationItems}, ${AllocationStatus}, false)}"></div>
    </th:block>
    <th:block th:if="${!#lists.isEmpty(newItems)}">
        <div th:replace="~{fragments/warehouseItemsListFragment :: box(#{warehouse.new}, ${newItems}, ${NewStatus}, true)}"></div>
    </th:block>
    <th:block th:if="${!#lists.isEmpty(reservedItems)}">
        <div th:replace="~{fragments/warehouseItemsListFragment :: box(#{warehouse.reserved}, ${reservedItems}, ${ReservedStatus}, true)}"></div>
    </th:block>
    <th:block th:if="${!#lists.isEmpty(inRMAItems)}">
        <div th:replace="~{fragments/warehouseItemsListFragment :: box(#{warehouse.in.rma}, ${inRMAItems}, ${InRMAStatus}, true)}"></div>
    </th:block>
    <th:block th:if="${!#lists.isEmpty(inExternalServiceItems)}">
        <div th:replace="~{fragments/warehouseItemsListFragment :: box(#{warehouse.in.external.service}, ${inExternalServiceItems}, ${InExternalServiceStatus}, true)}"></div>
    </th:block>

    <div class="box">
        <form action="/dashboard/warehouse/restock" method="post">
            <div class="field is-grouped is-grouped-centered">
                <div class="control">
                    <div class="select is-small is-fullwidth">
                        <select id="restockCatalog" name="catalogId" required>
                            <option value="" th:text="#{warehouse.restock.catalog}">Katalog</option>
                            <option th:each="catalog : ${restockCatalogs}"
                                    th:value="${catalog.catalogId}"
                                    th:text="${catalog.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="control">
                    <div class="select is-small is-fullwidth">
                        <select id="restockCategory" name="categoryId">
                            <option value="" th:text="#{warehouse.restock.all.categories}">Wszystkie kategorie</option>
                        </select>
                    </div>
                </div>
                <div class="control">
                    <div class="select is-small is-fullwidth">
                        <select id="restockScope" name="scope" required>
                            <option value="ExpectedStockQty" th:text="#{warehouse.restock.scope.expected}">Expected stock qty</option>
                            <option value="WholeCatalog" th:text="#{warehouse.restock.scope.whole}">Cały katalog</option>
                        </select>
                    </div>
                </div>
                <div class="control">
                    <div class="select is-small is-fullwidth">
                        <select id="restockOperation" name="restockPrice" required>
                            <option value="HotDeal" th:text="#{warehouse.restock.hotdeal}">Hot deal</option>
                            <option value="LowestPrice" th:text="#{warehouse.restock.lowest}">Najniższa cena</option>
                            <option value="GoodDeal" th:text="#{warehouse.restock.promo}">Promocyjna</option>
                            <option value="Standard" th:text="#{warehouse.restock.standard}">Standardowa</option>
                            <option value="" th:text="#{warehouse.restock.current}">Aktualna</option>
                        </select>
                    </div>
                </div>
                <div class="control">
                    <label class="checkbox">
                        <input type="checkbox" name="onlyMissingItems" value="true"/>
                        <span th:text="#{warehouse.restock.only.missing}">Tylko brakujące przedmioty</span>
                    </label>
                </div>
                <div class="control">
                    <button type="submit" class="button is-primary is-small">
                        <span class="icon is-small"><i class="fas fa-sync-alt"></i></span>
                        <span th:text="#{general.execute}">Uzupełnij</span>
                    </button>
                </div>
            </div>
        </form>
        <div class="buttons is-centered mt-2">
            <button type="button" class="button is-link is-light is-small" onclick="openQuickAddModal()">
                <span class="icon is-small"><i class="fas fa-plus"></i></span>
                <span th:text="#{warehouse.add.item}">Dodaj przedmiot ręcznie</span>
            </button>
            <a href="/dashboard/warehouse/items/destroyed" class="button is-danger is-light is-small">
                <span class="icon is-small"><i class="fas fa-trash"></i></span>
                <span th:text="#{warehouse.view.destroyed.items}"></span>
            </a>
        </div>
    </div>

    <div id="quickAddModal" class="modal">
        <div class="modal-background" onclick="toggleQuickAddModal(false)"></div>
        <div class="modal-card" style="width: 480px; max-width: 90vw;">
            <header class="modal-card-head">
                <p class="modal-card-title" th:text="#{warehouse.add.item}"></p>
                <button class="delete" type="button" onclick="toggleQuickAddModal(false)"></button>
            </header>

            <form id="quickAddForm" method="post" onsubmit="normalizeQuickAddPrice()"
                  th:action="@{/dashboard/warehouse/items/quick-add}">
                <section class="modal-card-body">
                    <div class="field">
                        <label class="label" th:text="#{general.manufacturer.code}"></label>
                        <div class="control">
                            <input class="input" type="text" id="quickAddMfn" name="manufacturerCode" required
                                   th:placeholder="#{inventory.product.code.placeholder}"/>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{order.item.price.purchase}"></label>
                        <div class="field has-addons mb-0">
                            <div class="control is-expanded">
                                <input class="input" type="text" id="quickAddPrice" name="cost" required
                                       th:attr="data-tax=${defaultVatRate}"
                                       oninput="updateQuickAddPriceHint()"/>
                            </div>
                            <div class="control">
                                <button type="button" id="quickAddPriceTypeNet" class="button is-primary is-selected"
                                        onclick="setQuickAddPriceType('net')"
                                        th:text="#{order.item.price.type.net}"></button>
                            </div>
                            <div class="control">
                                <button type="button" id="quickAddPriceTypeGross" class="button"
                                        onclick="setQuickAddPriceType('gross')"
                                        th:text="#{order.item.price.type.gross}"></button>
                            </div>
                        </div>
                        <input type="hidden" id="quickAddPriceType" value="net"/>
                        <p class="help" id="quickAddPriceHint" style="display: none;"
                           th:attr="data-template=#{order.item.price.net.hint}"></p>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{warehouse.item.quantity}"></label>
                        <div class="control">
                            <input class="input" type="number" id="quickAddQty" name="qty" min="1" value="1" required/>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{warehouse.item.status}"></label>
                        <div class="control">
                            <div class="select is-fullwidth">
                                <select id="quickAddStatus" name="status">
                                    <option th:each="status : ${quickAddStatuses}" th:value="${status}"
                                            th:text="${enumI18n.localize(status)}"></option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{order.item.supplier}"></label>
                        <div class="control">
                            <input class="input" type="text" id="quickAddSupplier" name="supplier" required/>
                        </div>
                    </div>
                </section>

                <footer class="modal-card-foot">
                    <button class="button is-primary" type="submit" th:text="#{general.save}"></button>
                    <button class="button" type="button" onclick="toggleQuickAddModal(false)" th:text="#{general.cancel}"></button>
                </footer>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        // Initialize from server-side selected values (includes defaults)
        const selectedCategories = new Set(/*[[${selectedCategories}]]*/ []);
        const selectedStatuses = new Set(/*[[${selectedStatuses}]]*/ []);

        function navigateWithFilters() {
            const params = new URLSearchParams();

            selectedCategories.forEach(cat => params.append('categories', cat));
            selectedStatuses.forEach(status => params.append('statuses', status));

            window.location.href = '/dashboard/warehouse?' + params.toString();
        }

        // Category tag click handler
        document.querySelectorAll('.category-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                const category = this.getAttribute('data-category');
                if (selectedCategories.has(category)) {
                    selectedCategories.delete(category);
                } else {
                    selectedCategories.add(category);
                }
                navigateWithFilters();
            });
        });

        // Status tag click handler
        document.querySelectorAll('.status-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                const status = this.getAttribute('data-status');
                if (selectedStatuses.has(status)) {
                    selectedStatuses.delete(status);
                } else {
                    selectedStatuses.add(status);
                }
                navigateWithFilters();
            });
        });

        // Clear filters button
        document.getElementById('clearFilters').addEventListener('click', function() {
            window.location.href = '/dashboard/warehouse?showAll=true';
        });

        const categoriesByCatalog = /*[[${restockCategoriesByCatalog}]]*/ {};
        const catalogSelect = document.getElementById('restockCatalog');
        const categorySelect = document.getElementById('restockCategory');
        const allCategoriesLabel = categorySelect.options[0].textContent;

        catalogSelect.addEventListener('change', function() {
            const selected = this.value;
            categorySelect.innerHTML = '';
            const allOpt = document.createElement('option');
            allOpt.value = '';
            allOpt.textContent = allCategoriesLabel;
            categorySelect.appendChild(allOpt);

            const categories = categoriesByCatalog[selected] || [];
            categories.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = c.name;
                categorySelect.appendChild(opt);
            });
        });

        function toggleQuickAddModal(show) {
            document.getElementById('quickAddModal').classList.toggle('is-active', show);
        }

        function openQuickAddModal() {
            document.getElementById('quickAddMfn').value = '';
            document.getElementById('quickAddPrice').value = '';
            document.getElementById('quickAddQty').value = '1';
            document.getElementById('quickAddSupplier').value = '';
            setQuickAddPriceType('net');
            toggleQuickAddModal(true);
        }

        function setQuickAddPriceType(type) {
            document.getElementById('quickAddPriceType').value = type;
            document.getElementById('quickAddPriceTypeNet').classList.toggle('is-primary', type === 'net');
            document.getElementById('quickAddPriceTypeNet').classList.toggle('is-selected', type === 'net');
            document.getElementById('quickAddPriceTypeGross').classList.toggle('is-primary', type === 'gross');
            document.getElementById('quickAddPriceTypeGross').classList.toggle('is-selected', type === 'gross');
            updateQuickAddPriceHint();
        }

        function normalizeQuickAddPrice() {
            const priceInput = document.getElementById('quickAddPrice');
            priceInput.value = priceInput.value.replace(',', '.').trim();

            const net = calculateQuickAddNetPrice();
            if (net !== null) {
                priceInput.value = net.toFixed(2);
            }
        }

        function calculateQuickAddNetPrice() {
            const priceInput = document.getElementById('quickAddPrice');
            const gross = parseFloat((priceInput.value || '').replace(',', '.'));
            const tax = parseFloat(priceInput.getAttribute('data-tax'));
            const isGross = document.getElementById('quickAddPriceType').value === 'gross';

            if (!isGross || isNaN(gross) || isNaN(tax) || tax < 1) {
                return null;
            }
            return gross / tax;
        }

        function updateQuickAddPriceHint() {
            const hint = document.getElementById('quickAddPriceHint');
            const net = calculateQuickAddNetPrice();

            if (net === null) {
                hint.style.display = 'none';
                return;
            }

            const tax = parseFloat(document.getElementById('quickAddPrice').getAttribute('data-tax'));
            const vatPercent = Math.round((tax - 1) * 10000) / 100;
            hint.textContent = hint.getAttribute('data-template')
                .replace('{0}', net.toFixed(2))
                .replace('{1}', vatPercent);
            hint.style.display = '';
        }
    </script>

</div>

</body>
</html>
