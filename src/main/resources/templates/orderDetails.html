<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>

<div layout:fragment="content">

    <style>
        .fixed-width-select {
            width: 200px;
        }
        .truncate-sku {
            max-width: 80px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
        }
        .truncate-serial {
            max-width: 160px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
        }
        .copyable {
            cursor: pointer;
        }
        .copyable:hover {
            text-decoration: underline;
        }
        .assign-sku-chips-box {
            background: #f8f9fb;
            border: 1px solid #e6e8eb;
            border-radius: 8px;
            padding: .7rem 1rem;
        }
        .assign-sku-chips {
            display: flex;
            flex-wrap: wrap;
            gap: .4rem;
            min-height: 2rem;
            align-items: center;
        }
        .assign-sku-chip {
            display: inline-flex;
            align-items: center;
            gap: .35rem;
            font-family: monospace;
            font-size: .8rem;
            background: #eef4ff;
            color: #2b5db8;
            border: 1px solid #d4e2f8;
            border-radius: 4px;
            padding: .15rem .5rem;
        }
        .assign-sku-chip.is-foreign {
            background: #fff8e6;
            color: #946c00;
            border-color: #f0dfa8;
        }
        .assign-sku-chip .chip-del {
            cursor: pointer;
            opacity: .55;
            font-size: .7rem;
        }
        .assign-sku-chip .chip-del:hover {
            opacity: 1;
        }
        .assign-sku-chips-empty {
            font-size: .8rem;
            color: #9aa1ab;
            font-style: italic;
        }
        .assign-sku-preview {
            font-family: monospace;
            font-size: .82rem;
            background: #f1f2f4;
            border-radius: 4px;
            padding: .3rem .6rem;
            word-break: break-all;
            color: #4a4f57;
        }
        .assign-sku-preview .sep {
            color: #c0392b;
            font-weight: 700;
        }
        .assign-sku-scroll {
            max-height: 320px;
            overflow-y: auto;
            border: 1px solid #e6e8eb;
            border-radius: 6px;
        }
        .assign-sku-scroll thead th {
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 1;
            box-shadow: 0 1px 0 #e6e8eb;
        }
        .assign-sku-table {
            font-size: .87rem;
        }
        .assign-sku-table td, .assign-sku-table th {
            vertical-align: middle;
        }
        .assign-sku-table tbody tr {
            cursor: pointer;
        }
        .assign-sku-table tbody tr.is-picked {
            background: #eef8f1 !important;
        }
        .assign-sku-table .mono {
            font-family: monospace;
            font-size: .82rem;
            white-space: nowrap;
        }
        .assign-sku-empty {
            padding: 2rem;
            text-align: center;
            color: #9aa1ab;
            font-size: .85rem;
        }
        .assign-sku-heading {
            font-size: .72rem;
            text-transform: uppercase;
            letter-spacing: .04em;
            color: #9aa1ab;
        }
    </style>

    <div class="box mb-5">
        <div class="columns is-vcentered">
            <div class="column">
                <p class="heading" th:text="#{order.order.id}"></p>
                <p class="title is-5" th:text="${order.orderId}"></p>
            </div>
            <div class="column">
                <p class="heading" th:text="#{order.ordered.at}"></p>
                <p class="title is-5" th:text="${order.orderedAt}"></p>
            </div>
            <div class="column">
                <p class="heading" th:text="#{order.source}"></p>
                <p class="title is-5">
                    <span th:text="${order.source?.name != null ? order.source.name : '-'}"></span>
                    <span th:if="${order.source?.type != null}" th:text="' (' + ${order.source.type} + ')'" class="is-size-6 has-text-grey"></span>
                </p>
            </div>
        </div>
    </div>

    <div class="columns">
        <div class="column">
            <div class="box">
                <form th:action="@{/dashboard/orders/{orderId}/updateOrderInfo(orderId=${order.orderId})}"
                      th:object="${order}" method="post">
                    <article class="media">
                        <div class="media-content">
                            <div class="content">
                                <div class="field">
                                    <label class="label" th:text="#{order.estimated.assembly}"></label>
                                    <div class="control">
                                        <input class="input" type="date" th:field="*{estimatedAssemblyAt}" th:disabled="${isCompletedOrder}"/>
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label" th:text="#{order.estimated.shipping}"></label>
                                    <div class="control">
                                        <input class="input" type="date" th:field="*{estimatedShippingAt}" th:disabled="${isCompletedOrder}"/>
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label" th:text="#{order.status}"></label>
                                    <div class="control">
                                        <div class="select">
                                            <select th:field="*{status}" th:disabled="${isCompletedOrder}">
                                                <option th:each="status : ${orderStatuses}" th:value="${status}"
                                                        th:text="${enumI18n.localize(status)}"></option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label" th:text="#{offers.fulfilment.type}"></label>
                                    <div class="control">
                                        <div class="select">
                                            <select th:field="*{fulfilmentType}" th:disabled="${isCompletedOrder}">
                                                <option th:each="fulfilmentType : ${fulfilmentTypes}" th:value="${fulfilmentType}" th:text="${fulfilmentType}"></option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label" th:text="#{order.affiliate.id}"></label>
                                    <div class="control">
                                        <label>
                                            <input class="input" type="text" th:field="*{affiliateId}" th:disabled="${isCompletedOrder}"/>
                                        </label>
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="label" th:text="#{order.gclid}"></label>
                                    <div class="control">
                                        <label>
                                            <input class="input" type="text" th:field="*{gclid}" th:disabled="${isCompletedOrder}"/>
                                        </label>
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="checkbox">
                                        <input type="checkbox" th:field="*{emailNotificationsEnabled}" th:disabled="${isCompletedOrder}">
                                        <span th:text="#{order.email.notifications}"></span>
                                    </label>
                                </div>
                                <div class="field">
                                    <label class="label" th:text="#{general.comment}"></label>
                                    <div class="control">
                                        <textarea class="textarea" th:field="*{comment}"
                                                  th:placeholder="#{general.comment.placeholder}" th:disabled="${isCompletedOrder}"></textarea>
                                    </div>
                                </div>
                                <div class="field">
                                    <div class="control">
                                        <button class="button is-primary is-small" type="submit" th:disabled="${isCompletedOrder}" th:text="#{general.save}"></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </article>
                </form>
            </div>
        </div>

        <!-- New Profit Information Section -->
        <div class="column">
            <div class="box">
                <table class="table is-fullwidth">
                    <thead>
                    <tr>
                        <th th:text="#{order.profit.info}"></th>
                        <th th:text="#{order.cost.info}"></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td><strong th:text="#{order.total.items.price} + ':'"></strong> <span
                                th:text="${orderFinancials.totalItemsPrice}"></span></td>
                        <td><strong th:text="#{order.total.items.cost} + ':'"></strong> <span
                                th:text="${orderFinancials.totalItemsCostGross}"></span></td>
                    </tr>
                    <tr>
                        <td><strong th:text="#{order.total.services.price} + ':'"></strong> <span
                                th:text="${orderFinancials.totalServicesPrice}"></span></td>
                        <td><strong th:text="#{order.total.services.cost} + ':'"></strong> <span
                                th:text="${orderFinancials.totalServicesCostGross}"></span></td>
                    </tr>
                    <tr>
                        <td><strong th:text="#{order.total.processing.fees.price} + ':'"></strong> <span
                                th:text="0"></span></td>
                        <td><strong th:text="#{order.total.processing.fees.cost} + ':'"></strong> <span
                                th:text="${orderFinancials.totalProcessingFeesCostGross}"></span></td>
                    </tr>
                    <tr>
                        <td><strong th:text="#{order.total.price} + ':'"></strong> <span th:id="totalPrice" th:text="${order.totalPrice}"></span>
                        </td>
                        <td><strong th:text="#{order.total.cost} + ':'"></strong> <span th:id="totalCost" th:text="${orderFinancials.totalCost}"></span>
                        </td>
                    </tr>
                    </tbody>
                    <tfoot>
                    <tr>
                        <td colspan="2"><strong th:text="#{order.total.profit.gross} + ':'"></strong> <span
                                th:text="${orderFinancials.totalProfit}"></span></td>
                    </tr>
                    <tr>
                        <td colspan="2"><strong th:text="#{order.total.profit.net} + ':'"></strong> <strong><span
                                th:text="${orderFinancials.totalProfitNet}" class="has-text-success"></span></strong>
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2"><strong th:text="#{order.unpaid.amount} + ':'"></strong>
                            <span th:text="${order.unpaidAmount}"
                                  th:classappend="${order.unpaidAmount != 0} ? 'has-text-danger' : ''"></span>
                        </td>
                    </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <!-- New Order Events Section -->
        <div class="column">
            <div class="box">
                <table class="table is-fullwidth">
                    <thead>
                    <tr>
                        <th th:text="#{order.event.type}"></th>
                        <th th:text="#{order.event.name}"></th>
                        <th th:text="#{order.event.date}"></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="event : ${orderEvents}">
                        <td th:text="${event.type}"></td>
                        <td th:text="${event.name}"></td>
                        <td th:text="${event.createdAt}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <form id="orderItemsForm" method="post" th:object="${orderItemsForm}" th:attr="data-order-id=${order.orderId}">
        <input type="hidden" name="position" th:value="${#lists.size(orderItemsForm.orderItems)}"
               th:attr="data-default-position=${#lists.size(orderItemsForm.orderItems)}"/>
        <h2 class="subtitle" th:text="#{order.items}"></h2>
        <div class="box mb-5">
            <div class="table-container mb-4">
                <table class="table is-fullwidth is-striped">
                    <thead>
                    <tr>
                        <th th:text="#{order.item.select}" style="width: 60px;"></th>
                        <th th:text="#{order.item.category}"></th>
                        <th th:text="#{order.item.sku}"></th>
                        <th th:text="#{order.item.name}"></th>
                        <th th:text="#{order.item.unit.price}"></th>
                        <th th:text="#{order.item.unit.cost}"></th>
                        <th th:text="#{order.item.quantity}"></th>
                        <th th:text="#{general.manufacturer.code}"></th>
                        <th th:text="#{general.delivery.id}"></th>
                        <th th:text="#{order.item.serial.no}"></th>
                        <th th:text="#{order.item.status}"></th>
                        <th th:text="#{order.item.consolidated}"></th>
                        <th th:text="#{order.item.comment}"></th>
                        <th th:text="#{order.item.actions}" style="width: 60px;"></th>
                    </tr>
                    </thead>
                    <tbody id="orderItemsRows">
                    <tr th:each="item, iterStat : *{orderItems}"
                        th:attr="data-category=${item.category},data-position=${item.position},data-service=${item.service}">
                        <td style="width: 60px;">
                            <input type="checkbox" th:field="*{orderItems[__${iterStat.index}__].selected}" th:disabled="${isCompletedOrder or hasWarehouseDocument}"/>
                            <input type="hidden" th:field="*{orderItems[__${iterStat.index}__].orderId}"/>
                            <input type="hidden" th:field="*{orderItems[__${iterStat.index}__].itemId}"/>
                        </td>
                        <td th:text="${item.category}"></td>
                        <td>
                            <span th:if="${item.sku}" class="copyable truncate-sku" th:text="${item.sku}" th:title="${item.sku}" th:data-copy="${item.sku}" onclick="copyToClipboard(this)"></span>
                        </td>
                        <td th:text="${item.name}"></td>
                        <td th:text="${item.price}"></td>
                        <td th:text="${item.unitCost.grossValue}"></td>
                        <td th:text="${item.qty}"></td>
                        <td>
                            <span th:if="${item.manufacturerCode}" class="copyable" th:text="${item.manufacturerCode}" th:data-copy="${item.manufacturerCode}" onclick="copyToClipboard(this)"></span>
                        </td>
                        <td>
                            <a th:if="${item.deliveryId != null}" th:href="@{${@deliveryRedirectResolver.resolveFor(item)}}" th:text="${item.shortenedDeliveryId}"></a>
                        </td>
                        <td>
                            <span th:if="${item.serialNo}" class="copyable truncate-serial" th:text="${item.serialNo}" th:title="${item.serialNo}" th:data-copy="${item.serialNo}" onclick="copyToClipboard(this)"></span>
                        </td>
                        <td>
                            <span class="tag"
                                  th:classappend="${item.status.name() == 'Reserved'} ? 'is-warning-light' :
                                                  (${item.status.name() == 'Allocation'} ? 'is-warning' :
                                                  (${item.status.name() == 'Ordered'} ? 'is-link' :
                                                  (${item.status.name() == 'Delivered'} ? 'is-success' :
                                                  (${item.status.name() == 'InRMA'} ? 'is-danger' : ''))))"
                                  th:text="${enumI18n.localize(item.status)}"
                                  th:id="'status-tag-' + ${iterStat.index}"
                                  th:attr="data-status=${item.status}"></span>
                        </td>
                        <td>
                            <span th:if="${item.consolidated}" class="icon has-text-success"><i class="fas fa-check"></i></span>
                        </td>
                        <td th:text="${item.comment}"></td>
                        <td style="width: 60px;">
                            <div class="dropdown is-hoverable is-right"
                                 onmouseenter="allowTableOverflow(this, true)"
                                 onmouseleave="allowTableOverflow(this, false)">
                                <div class="dropdown-trigger">
                                    <button type="button" class="button is-small is-ghost" aria-haspopup="true" aria-controls="dropdown-menu">
                                        <span class="icon is-small">
                                            <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
                                        </span>
                                    </button>
                                </div>
                                <div class="dropdown-menu" role="menu">
                                    <div class="dropdown-content">
                                        <a th:if="${item.isNew() and !item.group}" class="dropdown-item"
                                           href="#"
                                           th:attr="data-item-id=${item.itemId},data-sku=${item.sku},data-name=${item.name},data-category=${item.category},data-qty=${item.qty},data-price=${item.price}"
                                           onclick="openAssignSkuModal(this); return false;"
                                           th:text="#{order.item.assign.sku}"></a>
                                        <span th:unless="${item.isNew() and !item.group}" class="dropdown-item has-text-grey-light" style="cursor: not-allowed;"
                                              th:text="#{order.item.assign.sku}"></span>
                                        <a th:if="${item.isNew() and !item.group}" class="dropdown-item"
                                           href="#"
                                           th:attr="data-item-id=${item.itemId},data-tax=${item.tax},data-sku=${item.sku}"
                                           onclick="openQuickAssignModal(this); return false;"
                                           th:text="#{order.item.quick.assign}"></a>
                                        <span th:unless="${item.isNew() and !item.group}" class="dropdown-item has-text-grey-light" style="cursor: not-allowed;"
                                              th:text="#{order.item.quick.assign}"></span>
                                        <a th:if="${item.isNew() and !item.group}" class="dropdown-item"
                                           href="#"
                                           th:attr="data-item-id=${item.itemId},data-sku=${item.sku},data-name=${item.name},data-category=${item.category},data-qty=${item.qty},data-price=${item.price}"
                                           onclick="openAssignWarehouseModal(this); return false;"
                                           th:text="#{order.item.assign.warehouse}"></a>
                                        <span th:unless="${item.isNew() and !item.group}" class="dropdown-item has-text-grey-light" style="cursor: not-allowed;"
                                              th:text="#{order.item.assign.warehouse}"></span>
                                        <a th:if="${item.isNew() and !item.group}" class="dropdown-item"
                                           href="#"
                                           th:attr="data-item-id=${item.itemId}"
                                           onclick="submitClearSupplier(this); return false;"
                                           th:text="#{order.item.clear.assign}"></a>
                                        <span th:unless="${item.isNew() and !item.group}" class="dropdown-item has-text-grey-light" style="cursor: not-allowed;"
                                              th:text="#{order.item.clear.assign}"></span>
                                        <a th:if="${item.isNew() and item.group and item.product}" class="dropdown-item"
                                           href="#"
                                           th:attr="data-item-id=${item.itemId}"
                                           onclick="openSplitGroupModal(this); return false;"
                                           th:text="#{order.item.split.group}"></a>
                                        <span th:unless="${item.isNew() and item.group and item.product}" class="dropdown-item has-text-grey-light" style="cursor: not-allowed;"
                                              th:text="#{order.item.split.group}"></span>
                                        <a class="dropdown-item"
                                           href="#"
                                           th:attr="data-item-id=${item.itemId}"
                                           onclick="submitToggleConsolidation(this); return false;"
                                           th:text="${item.consolidated} ? #{order.item.deconsolidate} : #{order.item.consolidate}"></a>
                                        <hr class="dropdown-divider">
                                        <a class="dropdown-item"
                                           th:href="@{/dashboard/orders/{orderId}/items/{itemId}(orderId=${item.orderId}, itemId=${item.itemId})}"
                                           th:text="#{order.item.edit}"></a>
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:replace="~{fragments/item-add-modal :: itemAddModal(entityId=${order.orderId}, actionPrefix='/dashboard/orders', formId='orderItemsForm')}"></div>

            <div class="field">
                <div class="control">
                    <div class="select is-small">
                        <select id="action-select" th:disabled="${isCompletedOrder or hasWarehouseDocument}">
                            <option value="moveSelectedItemsToAllocation" th:text="#{order.items.action.move.allocation}"></option>
                            <option value="moveSelectedItemsToTheWarehouse" th:text="#{order.items.action.move.warehouse}"></option>
                            <option value="moveSelectedItemsToTheWarehouseForRMA" th:text="#{order.items.action.move.warehouse.rma}"></option>
                            <option th:if="${canSplitOrder}" value="splitOrder" th:text="#{order.items.action.split}"></option>
                            <option th:unless="${isInvoiced}" value="removeSelectedItemsFromOrder" th:text="#{order.items.action.remove.from.order}"></option>
                        </select>
                    </div>
                    <button class="button is-primary is-small" type="button" th:disabled="${isCompletedOrder or hasWarehouseDocument}" onclick="confirmSave(this, submitOrderItemsForm)" th:text="#{general.execute}"></button>
                    <button class="button is-info is-small" type="button" th:disabled="${isCompletedOrder or hasWarehouseDocument or isInvoiced}" onclick="toggleOrderItemModal(true)" th:text="#{offers.add.items}"></button>
                    <button class="button is-info is-small" type="button" th:disabled="${isCompletedOrder or isNewOrder or #lists.isEmpty(serialUpdateItems)}" onclick="toggleSerialUpdateModal(true)" th:text="#{order.update.serial.no}"></button>
                </div>
            </div>
        </div>
    </form>

    <div id="serialUpdateModal" class="modal">
        <div class="modal-background" onclick="toggleSerialUpdateModal(false)"></div>

        <div class="modal-card" style="width: 70vw">
            <header class="modal-card-head">
                <p class="modal-card-title" th:text="#{order.update.serial.no}"></p>
                <button class="delete" onclick="toggleSerialUpdateModal(false)"></button>
            </header>

            <form th:action="@{/dashboard/orders/{orderId}/updateSerialNumbers(orderId=${order.orderId})}" method="post" onkeydown="if(event.key === 'Enter') event.preventDefault()">
                <section class="modal-card-body">
                    <table class="table is-fullwidth is-striped">
                        <thead>
                        <tr>
                            <th th:text="#{general.manufacturer.code}"></th>
                            <th th:text="#{order.item.name}"></th>
                            <th th:text="#{order.item.quantity}"></th>
                            <th th:text="#{general.delivery.id}"></th>
                            <th th:text="#{order.item.serial.no}"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item, i : ${serialUpdateItems}">
                            <td th:text="${item.manufacturerCode}" class="pt-4"></td>
                            <td th:text="${item.name}" class="pt-4"></td>
                            <td th:text="${item.qty}" class="pt-4"></td>
                            <td th:text="${item.shortenedDeliveryId}" class="pt-4"></td>
                            <td>
                                <input class="input" type="text" th:name="'orderItems[' + ${i.index} + '].serialNo'" th:value="${item.serialNo}">
                                <input type="hidden" th:name="'orderItems[' + ${i.index} + '].itemId'" th:value="${item.itemId}">
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </section>

                <footer class="modal-card-foot">
                    <button class="button is-primary" type="submit" th:text="#{general.save}"></button>
                    <button class="button" type="button" onclick="toggleSerialUpdateModal(false)" th:text="#{general.cancel}"></button>
                </footer>
            </form>
        </div>
    </div>

    <div id="quickAssignModal" class="modal">
        <div class="modal-background" onclick="toggleQuickAssignModal(false)"></div>
        <div class="modal-card" style="width: 480px; max-width: 90vw;">
            <header class="modal-card-head">
                <p class="modal-card-title" th:text="#{order.item.quick.assign}"></p>
                <button class="delete" type="button" onclick="toggleQuickAssignModal(false)"></button>
            </header>

            <form id="quickAssignForm" method="post" onsubmit="normalizeQuickAssignPrice()"
                  th:action="@{/dashboard/orders/{orderId}/assign-supplier(orderId=${order.orderId})}">
                <section class="modal-card-body">
                    <input type="hidden" id="quickAssignItemId" name="itemId"/>

                    <div class="field">
                        <label class="label" th:text="#{general.manufacturer.code}"></label>
                        <div class="control">
                            <input class="input" type="text" id="quickAssignMfn" name="manufacturerCode" required
                                   autocomplete="off" oninput="highlightQuickAssignSku()"
                                   th:placeholder="#{inventory.product.code.placeholder}"/>
                        </div>
                        <div class="tags mt-1 mb-0" id="quickAssignSkuOptions"></div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{order.item.price.purchase}"></label>
                        <div class="field has-addons mb-0">
                            <div class="control is-expanded">
                                <input class="input" type="text" id="quickAssignPrice" name="cost" required
                                       oninput="updateQuickAssignPriceHint()"/>
                            </div>
                            <div class="control">
                                <button type="button" id="quickAssignPriceTypeNet" class="button is-primary is-selected"
                                        onclick="setQuickAssignPriceType('net')"
                                        th:text="#{order.item.price.type.net}"></button>
                            </div>
                            <div class="control">
                                <button type="button" id="quickAssignPriceTypeGross" class="button"
                                        onclick="setQuickAssignPriceType('gross')"
                                        th:text="#{order.item.price.type.gross}"></button>
                            </div>
                        </div>
                        <input type="hidden" id="quickAssignPriceType" value="net"/>

                        <section class="modal-card-body">
                            <table class="table is-fullwidth">
                                <thead>
                                <tr>
                                    <th th:text="#{order.shipment.type}"></th>
                                    <th th:text="#{order.shipment.tracking.no}"></th>
                                    <th th:text="#{order.shipment.carrier}"></th>
                                    <th th:text="#{order.shipment.tracking.url}"></th>
                                    <th th:text="#{order.shipment.shipped.at}"></th>
                                    <th th:text="#{order.shipment.delivered.at}"></th>
                                </tr>
                                </thead>

                                <tbody id="editShipmentsBody">
                                <tr th:each="shipment, i : *{shipments}">
                                    <td>
                                        <div class="select is-fullwidth">
                                            <select th:field="*{shipments[__${i.index}__].type}">
                                                <option th:each="type : ${shipmentTypes}"

                                                        th:text="${type}">
                                                </option>
                                            </select>
                                        </div>
                                    </td>
                                    <td><input class="input" th:field="*{shipments[__${i.index}__].trackingNo}"></td>
                                    <td><input class="input" th:field="*{shipments[__${i.index}__].carrier}"></td>
                                    <td><input class="input" th:field="*{shipments[__${i.index}__].trackingUrl}" type="url"></td>
                                    <td>
                                        <input class="input"
                                               type="datetime-local"
                                               th:name="'shipments[' + ${i.index} + '].shippedAt'"
                                               th:value="${order.shipments[i.index].shippedAt != null ? #temporals.format(order.shipments[i.index].shippedAt, 'yyyy-MM-dd''T''HH:mm'): ''}">

                                        <input class="input"
                                               type="datetime-local"
                                               th:name="'shipments[' + ${i.index} + '].deliveredAt'"
                                               th:value="${order.shipments[i.index].deliveredAt != null ? #temporals.format(order.shipments[i.index].deliveredAt, 'yyyy-MM-dd''T''HH:mm') : ''}">

                <div class="field is-grouped">

                                        aria-haspopup="true" aria-controls="createDocumentMenu">
                                    <span th:text="#{order.action.create.document}"></span>
                                    <span class="icon is-small"><i class="fas fa-angle-down" aria-hidden="true"></i></span>

                                        <button type="submit" class="dropdown-item button is-ghost is-shadowless has-text-left"

                                    <form th:action="@{/dashboard/orders/{orderId}/invoicing(orderId=${order.orderId})}" method="post" style="margin: 0;" onsubmit="event.preventDefault();">

                                                class="dropdown-item button is-ghost is-shadowless has-text-left"

                                                onclick="document.getElementById('invoiceDocumentType').value=this.getAttribute('data-document-type'); confirmSave(this);"></button>
                                        <hr class="dropdown-divider" th:if="${!#lists.isEmpty(issuableDocumentTypes)}"/>
                                        <label class="dropdown-item checkbox" th:if="${!#lists.isEmpty(issuableDocumentTypes)}" style="display: flex; align-items: center;">
                                            <input type="checkbox" name="send" value="true" style="margin-right: 0.35rem;"/>

            <div id="receiptModal" class="modal">

                                           th:placeholder="#{order.document.no.placeholder}" required />

    <div class="columns">
        <div class="column">
            <h2 class="subtitle" th:text="#{order.review}"></h2>
            <div class="box">
                <table class="table is-fullwidth">
                    <thead>
                    <tr>
                        <th th:text="#{order.review.reference.no}"></th>

                        <th th:text="#{order.review.status}"></th>

                    </thead>
                    <tbody>
                    <tr>
                        <td th:text="${order.review?.referenceNo != null && !#strings.isEmpty(order.review.referenceNo) ? order.review.referenceNo : '-'}"></td>
                        <td th:text="${order.review?.requestedAt != null ? order.review.requestedAt : '-'}"></td>
                        <td th:text="${order.review?.status != null ? order.review.status : '-'}"></td>
                    </tr>
                    </tbody>
                </table>

                <div class="field">
                    <div class="control">
                        <button class="button is-primary is-small"
                                type="button"
                                th:disabled="${isCompletedOrder}"
                                onclick="toggleReviewModal(true)"
                                th:text="#{general.edit}"></button>
                    </div>
                </div>
            </div>

            <div id="reviewModal" class="modal">
                <div class="modal-background" onclick="toggleReviewModal(false)"></div>
                <div class="modal-card" style="width: 60vw">
                    <header class="modal-card-head">

                        <button type="button" class="delete" aria-label="close" onclick="toggleReviewModal(false)"></button>

                    <form th:action="@{/dashboard/orders/{orderId}/updateReview(orderId=${order.orderId})}" th:object="${order}" method="post">
                        <section class="modal-card-body">
                            <table class="table is-fullwidth">
                                <thead>
                                <tr>
                                    <th th:text="#{order.review.reference.no}"></th>

        <div class="column">
            <div th:replace="~{fragments/payments-section :: paymentsSection(
                    payments=${order.payments},
                    addPaymentAction=@{/dashboard/orders/{orderId}/addPayment(orderId=${order.orderId})},
                    updatePaymentsAction=@{/dashboard/orders/{orderId}/updatePayments(orderId=${order.orderId})},
                    expectedAmount=${orderFinancials.unpaidAmount},
                    pendingPayment=${pendingPayment},
                    paymentSources=${paymentSources},

    <div class="field">
        <div class="control is-flex is-align-items-center">
            <a class="button is-link ml-2" th:href="${isSuperAdmin} ? '/dashboard/store/' + ${order.storeId} + '/orders/' + ${order.orderId} + '/collection' : '/dashboard/orders/' + ${order.orderId} + '/collection'"
               th:text="#{order.action.collection}">
            </a>
            <a class="button is-link ml-2" th:href="${isSuperAdmin} ? '/dashboard/store/' + ${order.storeId} + '/orders/' + ${order.orderId} + '/card' : '/dashboard/orders/' + ${order.orderId} + '/card'"
               th:text="#{order.action.card}">
            </a>
            <form th:if="${canDeleteOrder}" method="post" th:action="@{/dashboard/orders/{orderId}/delete(orderId=${order.orderId})}" class="ml-2"
                  onsubmit="return confirm('Czy na pewno chcesz usunąć to zamówienie?');">
                <button class="button is-danger" type="submit" th:text="#{order.action.delete}"></button>
            </form>
            <form th:if="${canCancelOrder}" method="post" th:action="@{/dashboard/orders/{orderId}/cancel(orderId=${order.orderId})}" class="ml-2"
                  onsubmit="return confirm('Czy na pewno chcesz anulować to zamówienie? Ceny usług zostaną wyzerowane.');">
                <button class="button is-danger" type="submit" th:text="#{order.action.cancel}"></button>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', () => {
            const shouldOpenModal = /*[[${openModal}]]*/ false;
            if (shouldOpenModal) toggleOrderItemModal(true);
        });

        function submitCancelForm(orderId) {
            if (confirm("Are you sure you want to cancel this shipment?")) {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = `/dashboard/orders/${orderId}/cancelShipment`;
                document.body.appendChild(form);
                form.submit();
            }
        }

        function submitOrderItemsForm() {
            const form = document.getElementById('orderItemsForm');
            const actionSelect = document.getElementById('action-select');
            const selectedAction = actionSelect.value;
            const orderId = form.getAttribute('data-order-id');
            form.action = `/dashboard/orders/${orderId}/${selectedAction}`;
            form.method = 'POST';
            form.submit();
        }

        function toggleOrderItemModal(show) {
            const modal = document.getElementById('itemAddModalId');
            if (!modal) return;
            modal.classList.toggle('is-active', show);
        }

        function updateAddItemPosition(category) {
            const positionInput = document.querySelector('#orderItemsForm input[name="position"]');
            if (!positionInput) return;
            let position = positionInput.dataset.defaultPosition;
            document.querySelectorAll('#orderItemsRows tr[data-category]').forEach(row => {
                if (row.dataset.service !== 'true' && row.dataset.category === category) {
                    position = row.dataset.position;
                }
            });
            positionInput.value = position;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const categorySelect = document.querySelector('#itemAddModalId select[name="category"]');
            if (categorySelect) {
                categorySelect.addEventListener('change', () => updateAddItemPosition(categorySelect.value));
            }
        });

        function toggleReceiptModal(show) {
            const modal = document.getElementById('receiptModal');
            if (!modal) return;
            modal.classList.toggle('is-active', show);
        }

        function toggleReviewModal(show) {
            const modal = document.getElementById('reviewModal');
            if (!modal) return;
            modal.classList.toggle('is-active', show);
        }

        // Payments modal functions are defined inside fragments/payments-section.html
        // Add Payment modal functions are defined inside fragments/add-payment-modal.html

        function copyToClipboard(element) {
            navigator.clipboard.writeText(element.getAttribute('data-copy'));
        }

        function toggleEditShipmentsModal(show) {
            const modal = document.getElementById('editShipmentsModal');
            if (!modal) return;

            modal.classList.toggle('is-active', show);

            if (show) {
                const tbody = document.getElementById('editShipmentsBody');
                if (tbody && !tbody.dataset.blankAdded) {
                    addEmptyShipmentRow();
                    tbody.dataset.blankAdded = 'true';
                }
            }
        }

        function addEmptyShipmentRow() {
            const tbody = document.getElementById('editShipmentsBody');
            if (!tbody) return;

            const index = tbody.querySelectorAll('tr').length;

            const shipmentTypes = /*[[${shipmentTypes}]]*/ [];

            const typeOptions = shipmentTypes.map(t =>
                `<option value="${t}">${t}</option>`
            ).join('');

            const row = document.createElement('tr');
            row.innerHTML = `
        <td>
            <div class="select is-fullwidth">
                <select name="shipments[${index}].type">
                    ${typeOptions}
                </select>
            </div>
        </td>

        <td>
            <input class="input"
                   name="shipments[${index}].trackingNo"/>
        </td>

        <td>
            <input class="input"
                   name="shipments[${index}].carrier"/>
        </td>

        <td>
            <input class="input"
                   type="url"
                   name="shipments[${index}].trackingUrl"/>
        </td>

        <td>
            <input class="input"
                   type="datetime-local"
                   name="shipments[${index}].shippedAt"/>
        </td>

        <td>
            <input class="input"
                   type="datetime-local"
                   name="shipments[${index}].deliveredAt"/>
        </td>
    `;

            tbody.appendChild(row);
        }

        function addEmptyPaymentRow() {
            const tbody = document.getElementById('editPaymentsBody');
            if (!tbody) return;

            const index = tbody.querySelectorAll('tr').length;
            const paymentSources = /*[[${paymentSources}]]*/ [];

            const sourceOptions = paymentSources.map(s =>
                `<option value="${s}">${s}</option>`
            ).join('');

            const row = document.createElement('tr');
            row.innerHTML = `
        <td>
            <div class="select">
                <select name="payments[${index}].source">
                    ${sourceOptions}
                </select>
            </div>
        </td>

        <td>
            <input class="input" name="payments[${index}].name">
        </td>

        <td>
            <input class="input"
                   type="number"
                   step="0.01"
                   value="0"
                   name="payments[${index}].amount">
        </td>

        <td>
            <input class="input"
                   type="number"
                   step="0.01"
                   value="0"
                   name="payments[${index}].fee">
        </td>

        <td>
            <input class="input" name="payments[${index}].referenceNo">
        </td>

        <td>
            <input class="input" name="payments[${index}].bankTransactionNo">
        </td>

        <td>
            <input class="input" type="date" name="payments[${index}].bankTransactionDate">
        </td>
    `;

            tbody.appendChild(row);
        }

        function toggleSerialUpdateModal(show) {
            const modal = document.getElementById('serialUpdateModal');
            if (!modal) return;
            modal.classList.toggle('is-active', show);
        }

        function highlightQuickAssignSku() {
            const value = document.getElementById('quickAssignMfn').value.trim();
            document.querySelectorAll('#quickAssignSkuOptions .tag').forEach(tag => {
                tag.classList.toggle('is-primary', tag.textContent === value);
            });
        }

        function toggleQuickAssignModal(show) {
            const modal = document.getElementById('quickAssignModal');
            if (!modal) return;
            modal.classList.toggle('is-active', show);
        }

        function allowTableOverflow(dropdown, show) {
            const container = dropdown.closest('.table-container');
            if (!container) return;
            container.style.overflow = show ? 'visible' : '';
        }

        function openQuickAssignModal(button) {
            document.getElementById('quickAssignItemId').value = button.getAttribute('data-item-id') || '';
            document.getElementById('quickAssignMfn').value = '';

            const skuOptions = document.getElementById('quickAssignSkuOptions');
            skuOptions.innerHTML = '';
            (button.getAttribute('data-sku') || '').split(':')
                .map(sku => sku.trim())
                .filter(sku => sku.length > 0)
                .forEach(sku => {
                    const tag = document.createElement('a');
                    tag.className = 'tag';
                    tag.textContent = sku;
                    tag.onclick = () => {
                        document.getElementById('quickAssignMfn').value = sku;
                        highlightQuickAssignSku();
                    };
                    skuOptions.appendChild(tag);
                });
            highlightQuickAssignSku();
            document.getElementById('quickAssignPrice').value = '';
            document.getElementById('quickAssignSupplier').value = '';
            document.getElementById('quickAssignPrice').setAttribute('data-tax', button.getAttribute('data-tax') || '');
            setQuickAssignPriceType('net');
            toggleQuickAssignModal(true);
        }

        function setQuickAssignPriceType(type) {
            document.getElementById('quickAssignPriceType').value = type;
            document.getElementById('quickAssignPriceTypeNet').classList.toggle('is-primary', type === 'net');
            document.getElementById('quickAssignPriceTypeNet').classList.toggle('is-selected', type === 'net');
            document.getElementById('quickAssignPriceTypeGross').classList.toggle('is-primary', type === 'gross');
            document.getElementById('quickAssignPriceTypeGross').classList.toggle('is-selected', type === 'gross');
            updateQuickAssignPriceHint();
        }

        function normalizeQuickAssignPrice() {
            const priceInput = document.getElementById('quickAssignPrice');
            priceInput.value = priceInput.value.replace(',', '.').trim();

            const net = calculateQuickAssignNetPrice();
            if (net !== null) {
                priceInput.value = net.toFixed(2);
            }
        }

        function calculateQuickAssignNetPrice() {
            const priceInput = document.getElementById('quickAssignPrice');
            const gross = parseFloat((priceInput.value || '').replace(',', '.'));
            const tax = parseFloat(priceInput.getAttribute('data-tax'));
            const isGross = document.getElementById('quickAssignPriceType').value === 'gross';

            if (!isGross || isNaN(gross) || isNaN(tax) || tax < 1) {
                return null;
            }
            return gross / tax;
        }

        function updateQuickAssignPriceHint() {
            const hint = document.getElementById('quickAssignPriceHint');
            const net = calculateQuickAssignNetPrice();

            if (net === null) {
                hint.style.display = 'none';
                return;
            }

            const tax = parseFloat(document.getElementById('quickAssignPrice').getAttribute('data-tax'));
            const vatPercent = Math.round((tax - 1) * 10000) / 100;
            hint.textContent = hint.getAttribute('data-template')
                .replace('{0}', net.toFixed(2))
                .replace('{1}', vatPercent);
            hint.style.display = '';
        }

        let assignSkuSelected = [];
        let assignSkuData = [];
        const assignSkuPricelists = {};
        {
            const catalogSelect = document.getElementById('assignSkuCatalog');
            if (catalogSelect && catalogSelect.value) {
                assignSkuPricelists[catalogSelect.value] = availabilityAndPrices;
            }
        }

        function toggleAssignSkuModal(show) {
            const modal = document.getElementById('assignSkuModal');
            if (!modal) return;
            modal.classList.toggle('is-active', show);
        }

        function fillAssignItemContext(idPrefix, link) {
            const qty = parseInt(link.getAttribute('data-qty')) || 0;
            const price = parseFloat(link.getAttribute('data-price')) || 0;
            document.getElementById(idPrefix + 'Name').textContent = link.getAttribute('data-name') || '';
            document.getElementById(idPrefix + 'Sku').textContent = link.getAttribute('data-sku') || '';
            document.getElementById(idPrefix + 'Category').textContent = link.getAttribute('data-category') || '';
            document.getElementById(idPrefix + 'Qty').textContent = qty;
            document.getElementById(idPrefix + 'Price').textContent = formatPln(price);
            document.getElementById(idPrefix + 'Total').textContent = formatPln(price * qty);
        }

        function openAssignSkuModal(link) {
            document.getElementById('assignSkuItemId').value = link.getAttribute('data-item-id') || '';
            fillAssignItemContext('assignSkuItem', link);
            document.getElementById('assignSkuSearch').value = '';
            document.getElementById('assignSkuManual').value = '';

            assignSkuSelected = (link.getAttribute('data-sku') || '').split(':')
                .map(code => code.trim())
                .filter(code => code.length > 0)
                .map(code => ({ code: code, foreign: true }));

            renderAssignSkuChips();
            loadAssignSkuPricelist(document.getElementById('assignSkuCatalog').value, refreshAssignSkuModal);
            toggleAssignSkuModal(true);
        }

        function onAssignSkuCatalogChange(select) {
            loadAssignSkuPricelist(select.value, refreshAssignSkuModal);
        }

        function loadAssignSkuPricelist(catalogId, onLoaded) {
            if (!catalogId) {
                assignSkuData = [];
                onLoaded();
                return;
            }
            if (assignSkuPricelists[catalogId]) {
                assignSkuData = assignSkuPricelists[catalogId];
                onLoaded();
                return;
            }
            const url = document.getElementById('assignSkuCatalog').getAttribute('data-url')
                + '?catalogId=' + encodeURIComponent(catalogId);
            fetch(url)
                .then(response => response.ok ? response.json() : [])
                .catch(() => [])
                .then(data => {
                    assignSkuPricelists[catalogId] = data;
                    assignSkuData = data;
                    onLoaded();
                });
        }

        function refreshAssignSkuModal() {
            assignSkuSelected.forEach(s => s.foreign = !assignSkuData.some(p => p.mfn === s.code));
            initAssignSkuCategories(document.getElementById('assignSkuItemCategory').textContent);
            onAssignSkuCategoryChange();
            renderAssignSkuChips();
        }

        function initAssignSkuCategories(itemCategory) {
            const select = document.getElementById('assignSkuCategory');
            select.innerHTML = '';
            select.appendChild(new Option(select.getAttribute('data-placeholder'), ''));
            [...new Set(assignSkuData.map(p => p.category))]
                .forEach(category => select.appendChild(new Option(category, category)));
            select.value = [...select.options].some(o => o.value === itemCategory) ? itemCategory : '';
        }

        function onAssignSkuCategoryChange() {
            const category = document.getElementById('assignSkuCategory').value;
            const select = document.getElementById('assignSkuLabel');
            select.innerHTML = '';
            select.appendChild(new Option(select.getAttribute('data-placeholder'), ''));
            [...new Set(assignSkuData.filter(p => p.category === category).map(p => p.label))]
                .forEach(label => select.appendChild(new Option(label, label)));
            renderAssignSkuTable();
        }

        function renderAssignSkuTable() {
            const category = document.getElementById('assignSkuCategory').value;
            const label = document.getElementById('assignSkuLabel').value;
            const search = document.getElementById('assignSkuSearch').value.trim().toLowerCase();

            let rows = assignSkuData.filter(p => !category || p.category === category);
            if (label) rows = rows.filter(p => p.label === label);
            if (search) rows = rows.filter(p =>
                p.name.toLowerCase().includes(search) || p.mfn.toLowerCase().includes(search));

            const tbody = document.getElementById('assignSkuRows');
            tbody.innerHTML = '';
            rows.forEach(p => {
                const picked = assignSkuSelected.some(s => s.code === p.mfn);
                const row = document.createElement('tr');
                row.classList.toggle('is-picked', picked);
                row.innerHTML = `
                    <td><input type="checkbox" ${picked ? 'checked' : ''}></td>
                    <td></td>
                    <td></td>
                    <td class="mono"></td>
                    <td class="has-text-right" style="white-space: nowrap;">${formatPln(p.price)}</td>
                    <td class="has-text-right ${p.qty > 0 ? 'has-text-success' : 'has-text-danger'}">${p.qty}</td>`;
                row.children[1].textContent = p.name;
                row.children[2].textContent = p.label;
                row.children[3].textContent = p.mfn;
                row.addEventListener('click', () => toggleAssignSkuPick(p.mfn));
                tbody.appendChild(row);
            });
            document.getElementById('assignSkuNoResults').style.display = rows.length ? 'none' : 'block';
        }

        function toggleAssignSkuPick(mfn) {
            const index = assignSkuSelected.findIndex(s => s.code === mfn);
            if (index >= 0) assignSkuSelected.splice(index, 1);
            else assignSkuSelected.push({ code: mfn, foreign: false });
            renderAssignSkuChips();
            renderAssignSkuTable();
        }

        function addAssignSkuManual() {
            const input = document.getElementById('assignSkuManual');
            const code = input.value.trim();
            if (!code || code.includes(':') || assignSkuSelected.some(s => s.code === code)) return;
            assignSkuSelected.push({ code: code, foreign: !assignSkuData.some(p => p.mfn === code) });
            input.value = '';
            renderAssignSkuChips();
            renderAssignSkuTable();
        }

        function renderAssignSkuChips() {
            const chips = document.getElementById('assignSkuChips');
            chips.innerHTML = '';
            if (assignSkuSelected.length === 0) {
                const empty = document.createElement('span');
                empty.className = 'assign-sku-chips-empty';
                empty.textContent = chips.getAttribute('data-empty');
                chips.appendChild(empty);
            }
            assignSkuSelected.forEach(s => {
                const chip = document.createElement('span');
                chip.className = 'assign-sku-chip' + (s.foreign ? ' is-foreign' : '');
                if (s.foreign) {
                    chip.title = chips.getAttribute('data-foreign');
                    chip.innerHTML = '<i class="fas fa-exclamation-triangle" style="font-size: .65rem;"></i>';
                }
                chip.appendChild(document.createTextNode(s.code));
                const del = document.createElement('span');
                del.className = 'chip-del';
                del.innerHTML = '<i class="fas fa-times"></i>';
                del.addEventListener('click', () => {
                    assignSkuSelected = assignSkuSelected.filter(x => x.code !== s.code);
                    renderAssignSkuChips();
                    renderAssignSkuTable();
                });
                chip.appendChild(del);
                chips.appendChild(chip);
            });

            document.getElementById('assignSkuChipCount').textContent = assignSkuSelected.length;

            const preview = document.getElementById('assignSkuPreview');
            preview.innerHTML = '';
            if (assignSkuSelected.length === 0) {
                preview.textContent = '—';
            } else {
                assignSkuSelected.forEach((s, i) => {
                    if (i > 0) {
                        const sep = document.createElement('span');
                        sep.className = 'sep';
                        sep.textContent = ':';
                        preview.appendChild(sep);
                    }
                    preview.appendChild(document.createTextNode(s.code));
                });
            }

            document.getElementById('assignSkuSubmit').disabled = assignSkuSelected.length === 0;
            document.getElementById('assignSkuHint').style.display = assignSkuSelected.length === 0 ? '' : 'none';
        }

        function prepareAssignSkuSubmit() {
            if (assignSkuSelected.length === 0) return false;
            document.getElementById('assignSkuValue').value = assignSkuSelected.map(s => s.code).join(':');
            return true;
        }

        let assignWarehouseData = [];
        let assignWarehouseSelectedId = '';
        const assignWarehouseCache = {};

        function toggleAssignWarehouseModal(show) {
            const modal = document.getElementById('assignWarehouseModal');
            if (!modal) return;
            modal.classList.toggle('is-active', show);
        }

        function openAssignWarehouseModal(link) {
            document.getElementById('assignWarehouseItemId').value = link.getAttribute('data-item-id') || '';
            fillAssignItemContext('assignWarehouseItem', link);
            document.getElementById('assignWarehouseSearch').value = '';
            assignWarehouseSelectedId = '';

            loadAssignWarehouseItems(link.getAttribute('data-category') || '', () => {
                renderAssignWarehouseTable();
                renderAssignWarehouseFooter();
            });
            toggleAssignWarehouseModal(true);
        }

        function loadAssignWarehouseItems(category, onLoaded) {
            if (assignWarehouseCache[category]) {
                assignWarehouseData = assignWarehouseCache[category];
                onLoaded();
                return;
            }
            const url = document.getElementById('assignWarehouseForm').getAttribute('data-url')
                + '?category=' + encodeURIComponent(category);
            fetch(url)
                .then(response => response.ok ? response.json() : [])
                .catch(() => [])
                .then(data => {
                    assignWarehouseCache[category] = data;
                    assignWarehouseData = data;
                    onLoaded();
                });
        }

        function renderAssignWarehouseTable() {
            const search = document.getElementById('assignWarehouseSearch').value.trim().toLowerCase();

            let rows = assignWarehouseData;
            if (search) rows = rows.filter(i =>
                (i.name || '').toLowerCase().includes(search)
                || (i.mfn || '').toLowerCase().includes(search)
                || (i.serialNo || '').toLowerCase().includes(search));

            const table = document.querySelector('#assignWarehouseModal table');
            const tbody = document.getElementById('assignWarehouseRows');
            tbody.innerHTML = '';
            rows.forEach(i => {
                const picked = i.itemId === assignWarehouseSelectedId;
                const delivered = i.status === 'Delivered';
                const statusLabel = table.getAttribute(delivered ? 'data-status-delivered' : 'data-status-ordered');
                const row = document.createElement('tr');
                row.classList.toggle('is-picked', picked);
                row.innerHTML = `
                    <td><input type="radio" name="assignWarehousePick" ${picked ? 'checked' : ''}></td>
                    <td></td>
                    <td class="mono"></td>
                    <td class="mono"></td>
                    <td class="has-text-right">${i.qty}</td>
                    <td><span class="tag ${delivered ? 'is-success' : 'is-link'}">${statusLabel}</span></td>`;
                row.children[1].textContent = i.name || '';
                row.children[2].textContent = i.mfn || '';
                row.children[3].textContent = i.serialNo || '';
                row.addEventListener('click', () => {
                    assignWarehouseSelectedId = i.itemId;
                    renderAssignWarehouseTable();
                    renderAssignWarehouseFooter();
                });
                tbody.appendChild(row);
            });
            document.getElementById('assignWarehouseNoResults').style.display = rows.length ? 'none' : 'block';
        }

        function renderAssignWarehouseFooter() {
            const hasSelection = !!assignWarehouseSelectedId;
            document.getElementById('assignWarehouseSubmit').disabled = !hasSelection;
            document.getElementById('assignWarehouseHint').style.display = hasSelection ? 'none' : '';
        }

        function prepareAssignWarehouseSubmit() {
            const selected = (assignWarehouseData || []).find(i => i.itemId === assignWarehouseSelectedId);
            if (!selected || !selected.mfn) return false;
            document.getElementById('assignWarehouseMfn').value = selected.mfn;
            return true;
        }

        function submitClearSupplier(link) {
            document.getElementById('clearSupplierItemId').value = link.getAttribute('data-item-id') || '';
            document.getElementById('clearSupplierForm').submit();
        }

        function submitToggleConsolidation(link) {
            document.getElementById('toggleConsolidationItemId').value = link.getAttribute('data-item-id') || '';
            document.getElementById('toggleConsolidationForm').submit();
        }

        const splitGroupPreviews = /*[[${splitGroupPreviews}]]*/ {};
        const splitGroupState = { qty: 1, total: 0 };

        function toggleSplitGroupModal(show) {
            const modal = document.getElementById('splitGroupModal');
            if (!modal) return;
            modal.classList.toggle('is-active', show);
        }

        function formatPln(value) {
            return value.toLocaleString('pl-PL', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' zł';
        }

        function openSplitGroupModal(link) {
            const itemId = link.getAttribute('data-item-id') || '';
            const preview = splitGroupPreviews[itemId];
            if (!preview) return;

            splitGroupState.qty = preview.qty;
            splitGroupState.total = preview.totalPrice;

            document.getElementById('splitGroupItemId').value = itemId;
            document.getElementById('splitGroupSourceName').textContent = preview.name;
            document.getElementById('splitGroupSourceSku').textContent = preview.sku;
            document.getElementById('splitGroupSourceQty').textContent = preview.qty;
            document.getElementById('splitGroupSourcePrice').textContent = formatPln(preview.price);
            document.getElementById('splitGroupSourceTotal').textContent = formatPln(preview.totalPrice);
            document.getElementById('splitGroupBarTotal').textContent = formatPln(preview.totalPrice);

            document.getElementById('splitGroupRows').innerHTML = '';
            preview.components.forEach(c => addSplitGroupRow(c.qty, c.sku, c.name));

            recalcSplitGroup();
            toggleSplitGroupModal(true);
        }

        function addSplitGroupRow(qty, sku, name) {
            const tbody = document.getElementById('splitGroupRows');
            const index = tbody.children.length;
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>
                    <input class="input is-small split-group-qty" type="number" min="1" required
                           name="rows[${index}].qty" value="${qty || splitGroupState.qty}">
                    <p class="help split-group-qty-hint"></p>
                </td>
                <td><input class="input is-small is-family-monospace" type="text" required name="rows[${index}].sku" value="${sku || ''}"></td>
                <td><input class="input is-small" type="text" required name="rows[${index}].name" value="${name || ''}"></td>
                <td><input class="input is-small split-group-price" type="number" min="0" step="0.01" required
                           name="rows[${index}].price" value="0.00"></td>
                <td class="has-text-right split-group-row-total" style="vertical-align: middle;"></td>
            `;
            tbody.appendChild(row);
            row.querySelectorAll('.split-group-qty, .split-group-price')
                .forEach(input => input.addEventListener('input', recalcSplitGroup));
        }

        function recalcSplitGroup() {
            const tbody = document.getElementById('splitGroupRows');
            let allocated = 0;

            tbody.querySelectorAll('tr').forEach(row => {
                const qty = parseInt(row.querySelector('.split-group-qty').value) || 0;
                const price = parseFloat(row.querySelector('.split-group-price').value) || 0;
                allocated += qty * price;
                row.querySelector('.split-group-row-total').textContent = formatPln(qty * price);

                const hint = row.querySelector('.split-group-qty-hint');
                if (qty % splitGroupState.qty === 0) {
                    hint.textContent = tbody.getAttribute('data-qty-hint')
                        .replace('{0}', qty / splitGroupState.qty)
                        .replace('{1}', splitGroupState.qty);
                    hint.classList.remove('has-text-warning-dark');
                } else {
                    hint.textContent = tbody.getAttribute('data-qty-warning').replace('{0}', splitGroupState.qty);
                    hint.classList.add('has-text-warning-dark');
                }
            });

            const difference = splitGroupState.total - allocated;
            const balanced = Math.abs(difference) < 0.005;

            document.getElementById('splitGroupBarAllocated').textContent = formatPln(allocated);
            document.getElementById('splitGroupBarDifference').textContent = formatPln(difference);

            const bar = document.getElementById('splitGroupAllocBar');
            bar.classList.toggle('is-success', balanced);
            bar.classList.toggle('is-danger', !balanced);

            document.getElementById('splitGroupSubmit').disabled = !balanced || tbody.children.length < 2;
        }

        function distributeSplitGroup() {
            const rows = [...document.querySelectorAll('#splitGroupRows tr')];
            if (rows.length === 0) return;

            const current = rows.map(row => ({
                row: row,
                qty: parseInt(row.querySelector('.split-group-qty').value) || 0,
                price: parseFloat(row.querySelector('.split-group-price').value) || 0
            }));

            let weights = current.map(c => c.qty * c.price);
            if (weights.every(w => w === 0)) {
                weights = current.map(c => c.qty);
            }
            const weightSum = weights.reduce((a, b) => a + b, 0);
            if (weightSum <= 0) return;

            current.forEach((c, i) => {
                const price = c.qty > 0 ? (splitGroupState.total * weights[i] / weightSum) / c.qty : 0;
                c.row.querySelector('.split-group-price').value = (Math.round(price * 100) / 100).toFixed(2);
            });

            recalcSplitGroup();
        }
    </script>

</div>

</body>
</html>
