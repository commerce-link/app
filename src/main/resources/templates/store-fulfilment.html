<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>

<div layout:fragment="content">

    <section class="section">
        <div class="container">

            <h1 class="title" th:text="#{store.fulfilment.settings}"></h1>

            <form th:action="@{/dashboard/store/fulfilment}" th:object="${form}" method="post"
                  enctype="multipart/form-data">

                <input type="hidden" th:field="*{store.storeId}"/>

                <div class="box">

                    <div class="field">
                        <label class="label" th:text="#{store.order.assembly.days}"></label>
                        <div class="control">
                            <input class="input" type="text" th:field="*{store.fulfilmentConfiguration.orderAssemblyDays}"
                                   th:placeholder="#{store.order.assembly.days}" />
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{store.order.realization.days}"></label>
                        <div class="control">
                            <input class="input" type="text" th:field="*{store.fulfilmentConfiguration.orderRealizationDays}"
                                   th:placeholder="#{store.order.realization.days}" />
                        </div>
                    </div>

                    <div class="field">
                        <label class="checkbox">
                            <input type="checkbox" th:field="*{store.fulfilmentConfiguration.automatedFulfilment}">
                            <strong th:text="#{store.enable.automated.fulfilment}"></strong>
                        </label>
                        <p th:text="#{store.enable.automated.fulfilment.description}"></p>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{store.fulfilment.default.type}"></label>
                        <div class="control">
                            <div class="select">
                                <select th:field="*{store.fulfilmentConfiguration.defaultFulfilmentType}">
                                    <option th:each="type : ${fulfilmentTypes}" th:value="${type}" th:text="${type}"></option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{store.enabled.product.groups}"></label>
                        <div th:each="type : ${productGroupTypes}" class="field">
                            <label class="checkbox">
                                <input type="checkbox"
                                       th:value="${type}"
                                       th:field="*{store.fulfilmentConfiguration.enabledProductGroups}" />
                                <span th:text="${enumI18n.localize(type)}"></span>
                            </label>
                        </div>
                    </div>

                    <div class="field" th:if="${isSuperAdmin}">
                        <label class="checkbox">
                            <input type="checkbox" class="global-suppliers-toggle"
                                   th:field="*{store.fulfilmentConfiguration.canUseGlobalSuppliers}">
                            <strong th:text="#{store.use.global.suppliers}"></strong>
                        </label>
                        <p th:text="#{store.use.global.suppliers.description}"></p>
                    </div>

                    <div class="field" th:if="${isSuperAdmin}">
                        <label class="label" th:text="#{store.inventory.cache.ttl}"></label>
                        <input class="input" type="number" min="1"
                               th:field="*{store.fulfilmentConfiguration.inventoryCacheTtlMinutes}">
                        <p th:text="#{store.inventory.cache.ttl.description}"></p>
                    </div>

                    <div class="field">
                        <label class="label" th:text="#{store.enabled.providers}"></label>
                        <div th:each="sel, stat : *{supplierSelections}" class="field supplier-item">
                            <input type="hidden" th:field="*{supplierSelections[__${stat.index}__].supplierName}" />
                            <label class="checkbox">
                                <input type="checkbox" class="supplier-enabled"
                                       th:field="*{supplierSelections[__${stat.index}__].enabled}" />
                                <span th:text="${sel.supplierName}"></span>
                            </label>
                            <div class="supplier-detail ml-5 mt-2">
                                <div class="field supplier-mode-wrap">
                                    <label class="label" th:text="#{store.supplier.connection.mode}"></label>
                                    <div class="control">
                                        <div class="select">
                                            <select class="supplier-mode" th:field="*{supplierSelections[__${stat.index}__].mode}">
                                                <option th:each="m : ${connectionModes}"
                                                        th:value="${m}"
                                                        th:text="#{'store.supplier.mode.' + ${m}}"></option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <div class="field">
                                    <label class="checkbox">
                                        <input type="checkbox"
                                               th:field="*{supplierSelections[__${stat.index}__].includeInPricing}" />
                                        <span th:text="#{store.supplier.include.pricing}"></span>
                                    </label>
                                </div>
                                <div class="field">
                                    <label class="checkbox">
                                        <input type="checkbox"
                                               th:field="*{supplierSelections[__${stat.index}__].includeInFulfilment}" />
                                        <span th:text="#{store.supplier.include.fulfilment}"></span>
                                    </label>
                                </div>
                                <div class="supplier-own-fields"
                                     th:if="${supplierFields.get(sel.supplierName) != null and !supplierFields.get(sel.supplierName).isEmpty()}">
                                    <div class="field" th:each="cf : ${supplierFields.get(sel.supplierName)}">
                                        <label class="label" th:text="${cf.label()}"></label>
                                        <div class="control">
                                            <input class="input"
                                                   th:type="${cf.type().name() == 'PASSWORD' ? 'password' : 'text'}"
                                                   th:name="'supplierConfiguration[' + ${sel.supplierName} + '][' + ${cf.key()} + ']'"
                                                   th:value="${form.supplierConfiguration.get(sel.supplierName) != null ? form.supplierConfiguration.get(sel.supplierName).get(cf.key()) : ''}"
                                                   th:placeholder="${cf.placeholder()}" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <hr/>
                        <label class="label" th:text="#{store.manual.section.title}">Manualni dostawcy</label>

                        <div id="manual-supplier-list">
                            <div th:each="ms, mstat : *{manualSupplierSelections}" class="field manual-item">
                                <input type="hidden" th:field="*{manualSupplierSelections[__${mstat.index}__].identity}" />
                                <input type="hidden" th:field="*{manualSupplierSelections[__${mstat.index}__].label}" />
                                <div class="is-flex is-justify-content-space-between is-align-items-center">
                                    <label class="checkbox">
                                        <input type="checkbox" class="manual-enabled"
                                               th:field="*{manualSupplierSelections[__${mstat.index}__].enabled}" />
                                        <span th:text="${ms.label}">label</span>
                                    </label>
                                    <button type="button" class="button is-danger is-light is-small manual-delete"
                                            th:data-identity="${ms.identity}" th:title="#{store.manual.delete.button}">
                                        <span class="icon"><i class="fas fa-trash"></i></span>
                                    </button>
                                </div>
                                <div class="manual-detail ml-5 mt-2">
                                    <div class="field has-addons">
                                        <div class="control">
                                            <button type="button" class="button is-link is-small manual-upload-open"
                                                    th:text="#{store.manual.upload.open}">Wgraj plik CSV</button>
                                        </div>
                                        <div class="control">
                                            <span class="manual-file-name help"
                                                  th:text="${ms.hasFeed} ? #{store.manual.feed.present} : #{store.manual.feed.missing}">status</span>
                                        </div>
                                    </div>
                                    <input type="file" accept=".csv" class="manual-file is-hidden"
                                           th:field="*{manualSupplierSelections[__${mstat.index}__].feed}" />
                                    <div class="field">
                                        <label class="checkbox">
                                            <input type="checkbox"
                                                   th:field="*{manualSupplierSelections[__${mstat.index}__].includeInPricing}" />
                                            <span th:text="#{store.supplier.include.pricing}"></span>
                                        </label>
                                    </div>
                                    <div class="field">
                                        <label class="checkbox">
                                            <input type="checkbox"
                                                   th:field="*{manualSupplierSelections[__${mstat.index}__].includeInFulfilment}" />
                                            <span th:text="#{store.supplier.include.fulfilment}"></span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="field has-addons mt-3">
                            <div class="control">
                                <input class="input" type="text" id="manual-new-name"
                                       th:placeholder="#{store.manual.add.label}" />
                            </div>
                            <div class="control">
                                <button type="button" class="button is-primary" id="manual-add-button"
                                        th:text="#{store.manual.add.button}">Dodaj</button>
                            </div>
                        </div>
                        <p class="help is-danger is-hidden" id="manual-add-error"></p>
                    </div>
                </div>

                <script th:inline="javascript">
                    (function() {
                        var globalToggle = document.querySelector('.global-suppliers-toggle');
                        var storeGlobalAllowed = /*[[${form.store.fulfilmentConfiguration.canUseGlobalSuppliers}]]*/ true;
                        var panels = document.querySelectorAll('.supplier-item');
                        function globalAllowed() {
                            return globalToggle ? globalToggle.checked : storeGlobalAllowed;
                        }
                        function refreshAll() {
                            var allowed = globalAllowed();
                            panels.forEach(function(panel) {
                                var isEnabled = panel.querySelector('.supplier-enabled').checked;
                                var detail = panel.querySelector('.supplier-detail');
                                var modeWrap = panel.querySelector('.supplier-mode-wrap');
                                var mode = panel.querySelector('.supplier-mode');
                                var ownFields = panel.querySelector('.supplier-own-fields');
                                if (detail) detail.style.display = isEnabled ? '' : 'none';
                                if (modeWrap) modeWrap.style.display = allowed ? '' : 'none';
                                if (mode) mode.disabled = !isEnabled || !allowed;
                                var effectiveOwn = !allowed || (mode && mode.value === 'OWN');
                                if (ownFields) {
                                    ownFields.style.display = (isEnabled && effectiveOwn) ? '' : 'none';
                                }
                            });
                        }
                        panels.forEach(function(panel) {
                            panel.querySelector('.supplier-enabled').addEventListener('change', refreshAll);
                            var mode = panel.querySelector('.supplier-mode');
                            if (mode) mode.addEventListener('change', refreshAll);
                        });
                        if (globalToggle) globalToggle.addEventListener('change', refreshAll);
                        refreshAll();
                    })();
                </script>

                <script th:inline="javascript">
                    (function () {
                        var list = document.getElementById('manual-supplier-list');
                        var template = document.getElementById('manual-row-template');
                        var addButton = document.getElementById('manual-add-button');
                        var nameInput = document.getElementById('manual-new-name');
                        var addError = document.getElementById('manual-add-error');
                        var nextIndex = list.querySelectorAll('.manual-item').length;

                        function wireRow(row) {
                            var enabled = row.querySelector('.manual-enabled');
                            var detail = row.querySelector('.manual-detail');
                            var openBtn = row.querySelector('.manual-upload-open');
                            var fileInput = row.querySelector('.manual-file');
                            var fileName = row.querySelector('.manual-file-name');
                            function refresh() { detail.style.display = enabled.checked ? '' : 'none'; }
                            enabled.addEventListener('change', refresh);
                            refresh();
                            openBtn.addEventListener('click', function () { fileInput.click(); });
                            fileInput.addEventListener('change', function () {
                                if (fileInput.files.length) { fileName.textContent = fileInput.files[0].name; }
                            });
                            row.querySelector('.manual-delete').addEventListener('click', function (e) {
                                var identity = e.currentTarget.getAttribute('data-identity');
                                confirmDelete(e.currentTarget, function () { deleteManual(identity, row); });
                            });
                        }

                        function deleteManual(identity, row) {
                            fetch('/dashboard/store/manual-supplier/' + encodeURIComponent(identity) + '/delete',
                                  { method: 'POST' })
                                .then(function (r) { if (r.ok) { row.remove(); } });
                        }

                        function addManual() {
                            var name = nameInput.value.trim();
                            addError.classList.add('is-hidden');
                            if (!name) { return; }
                            var body = new URLSearchParams(); body.append('name', name);
                            fetch('/dashboard/store/manual-supplier', { method: 'POST', body: body })
                                .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
                                .then(function (res) {
                                    if (!res.ok) {
                                        addError.textContent = res.body.messageCode || 'error';
                                        addError.classList.remove('is-hidden');
                                        return;
                                    }
                                    var html = template.innerHTML.replace(/__INDEX__/g, nextIndex++);
                                    var wrap = document.createElement('div');
                                    wrap.innerHTML = html.trim();
                                    var row = wrap.firstChild;
                                    row.querySelector('input[name$=".identity"]').value = res.body.identity;
                                    row.querySelector('input[name$=".label"]').value = res.body.label;
                                    row.querySelector('.manual-label').textContent = res.body.label;
                                    row.querySelector('.manual-delete').setAttribute('data-identity', res.body.identity);
                                    list.appendChild(row);
                                    wireRow(row);
                                    nameInput.value = '';
                                });
                        }

                        addButton.addEventListener('click', function () {
                            if (!nameInput.value.trim()) { return; }
                            onConfirmCallback = addManual;
                            formToSubmit = null;
                            document.getElementById('saveModal').classList.add('is-active');
                        });
                        list.querySelectorAll('.manual-item').forEach(wireRow);
                    })();
                </script>

                <div class="field is-grouped">
                    <div class="control">
                        <button class="button is-primary" type="button" onclick="confirmSave(this)"
                                th:text="#{general.save}"></button>
                    </div>
                    <div class="control">
                        <a th:href="@{/dashboard/store}" class="button is-light" th:text="#{general.cancel}"></a>
                    </div>
                </div>
            </form>

            <template id="manual-row-template">
                <div class="field manual-item">
                    <input type="hidden" name="manualSupplierSelections[__INDEX__].identity" />
                    <input type="hidden" name="manualSupplierSelections[__INDEX__].label" />
                    <div class="is-flex is-justify-content-space-between is-align-items-center">
                        <label class="checkbox">
                            <input type="checkbox" class="manual-enabled"
                                   name="manualSupplierSelections[__INDEX__].enabled" value="true" />
                            <span class="manual-label"></span>
                        </label>
                        <button type="button" class="button is-danger is-light is-small manual-delete"
                                data-identity="" th:title="#{store.manual.delete.button}">
                            <span class="icon"><i class="fas fa-trash"></i></span>
                        </button>
                    </div>
                    <div class="manual-detail ml-5 mt-2" style="display:none">
                        <div class="field has-addons">
                            <div class="control">
                                <button type="button" class="button is-link is-small manual-upload-open"
                                        th:text="#{store.manual.upload.open}">Wgraj plik CSV</button>
                            </div>
                            <div class="control">
                                <span class="manual-file-name help" th:text="#{store.manual.feed.missing}"></span>
                            </div>
                        </div>
                        <input type="file" accept=".csv" class="manual-file is-hidden"
                               name="manualSupplierSelections[__INDEX__].feed" />
                        <div class="field">
                            <label class="checkbox">
                                <input type="checkbox" name="manualSupplierSelections[__INDEX__].includeInPricing" value="true" />
                                <span th:text="#{store.supplier.include.pricing}"></span>
                            </label>
                        </div>
                        <div class="field">
                            <label class="checkbox">
                                <input type="checkbox" name="manualSupplierSelections[__INDEX__].includeInFulfilment" value="true" />
                                <span th:text="#{store.supplier.include.fulfilment}"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </template>

        </div>
    </section>

</div>

</body>
</html>
