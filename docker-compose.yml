# docker-compose.yml - Local development infrastructure for CommerceLink
#
# Usage: docker compose up -d
# Verify: curl http://localhost:4566/_localstack/health
#         aws dynamodb list-tables --endpoint-url http://localhost:8000

services:
  commercelink-ministack:
    image: ministackorg/ministack
    ports:
      - "4566:4566"
    environment:
      - AWS_DEFAULT_REGION=eu-central-1
    volumes:
      # Bootstrap script runs automatically when Ministack is ready
      - ./src/main/resources/local-init:/etc/localstack/init/ready.d
      # Bind mount so .cognito.env is written to the host for the Spring app
      - ./.ministack-data:/var/lib/localstack

  commercelink-dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    volumes:
      - ./.dynamodb-data:/data
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/localhost/8000) 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

