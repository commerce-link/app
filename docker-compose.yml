# docker-compose.yml - Local development infrastructure for CommerceLink
#
# Usage: docker compose up -d
# Verify: curl http://localhost:4566/_localstack/health
#         aws dynamodb list-tables --endpoint-url http://localhost:8000

services:
  commercelink-ministack:
    image: ministackorg/ministack
    ports:
      - "4566:4566"
    environment:
      - AWS_DEFAULT_REGION=eu-central-1
    volumes:
      # Bootstrap script runs automatically when Ministack is ready
      - ./src/main/resources/local-init/infra:/etc/localstack/init/ready.d
      # Seed data synced to S3 buckets on startup
      - ./src/main/resources/local-init/s3:/local/s3:ro
      # Bind mount so .cognito.env is written to the host for the Spring app
      - ./.ministack-data:/var/lib/localstack

  commercelink-dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/localhost/8000) 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  commercelink-dynamodb-migrate:
    image: amazon/aws-cli:latest
    depends_on:
      commercelink-dynamodb:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=eu-central-1
    volumes:
      - ./src/main/resources/local-init/dynamodb/01-dynamodb-schema.sh:/migrate.sh:ro
    entrypoint: ["/bin/bash", "/migrate.sh"]

  commercelink-dynamodb-seed:
    image: amazon/aws-cli:latest
    depends_on:
      commercelink-dynamodb-migrate:
        condition: service_completed_successfully
    environment:
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - AWS_DEFAULT_REGION=eu-central-1
    volumes:
      - ./src/main/resources/local-init/dynamodb/02-dynamodb-seed.sh:/seed.sh:ro
    entrypoint: ["/bin/bash", "/seed.sh"]
